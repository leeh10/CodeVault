<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>CodeVault — Edit Profile Settings</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #040404; --surface: #0a0a0a; --surface2: #121212;
  --border: #1c1c1c; --border2: #282828; --text: #f5f5f5; --muted: #666666;
  --accent: #ffffff;
}
* { margin:0; padding:0; box-sizing:border-box; }
body { background: var(--bg); color: var(--text); font-family: 'Space Grotesk', sans-serif; padding: 40px 20px; }
.profile-card {
  max-width: 500px; margin: 60px auto; background: var(--surface); border: 1px solid var(--border);
  border-radius: 14px; padding: 32px; box-shadow: 0 20px 40px rgba(0,0,0,0.5);
}
h2 { font-family: 'JetBrains Mono'; font-size: 18px; font-weight: 600; margin-bottom: 24px; }

/* CONTENEDOR DE AVATAR REDISEÑADO PARA DETECTAR CLICS */
.avatar-preview-box { display: flex; align-items: center; gap: 20px; margin-bottom: 28px; }
.avatar-wrapper { position: relative; width: 76px; height: 76px; cursor: pointer; }
.p-avatar { width: 100%; height: 100%; border-radius: 50%; object-fit: cover; background: #222; border: 2px solid var(--border2); transition: filter 0.2s; }
.avatar-wrapper:hover .p-avatar { filter: brightness(0.6); }
.avatar-wrapper::after {
  content: ':3'; position: absolute; inset: 0; display: flex; align-items: center; justify-content: center;
  font-size: 16px; opacity: 0; transition: opacity 0.2s; pointer-events: none;
}
.avatar-wrapper:hover::after { opacity: 1; }

/* OCULTAMOS EL INPUT FILE ORIGINAL */
#fileInput { display: none; }

label { display: block; font-size: 13px; color: var(--muted); margin-bottom: 6px; }
input[type="text"] {
  width: 100%; padding: 12px 14px; margin-bottom: 20px; background: var(--surface2);
  border: 1px solid var(--border); border-radius: 6px; color: white; font-family: 'Space Grotesk'; font-size: 14px;
}
input[type="text"]:focus { border-color: var(--border2); outline: none; }
.actions { display: flex; justify-content: flex-end; gap: 12px; }
.btn { padding: 10px 18px; border-radius: 6px; font-size: 13px; font-weight: 600; cursor: pointer; border: none; font-family: 'Space Grotesk'; }
.btn-save { background: var(--text); color: #040404; }
.btn-cancel { background: transparent; color: var(--muted); border: 1px solid var(--border); text-decoration: none; display: inline-flex; align-items: center; }
.toast { position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%) translateY(20px); background: var(--text); color: #040404; padding: 12px 22px; border-radius: 6px; font-size: 13px; font-weight: 600; opacity: 0; transition: all 0.3s ease; z-index: 100; }
.toast.show { opacity:1; transform:translateX(-50%) translateY(0); }
</style>
</head>
<body>

<div class="profile-card">
  <h2>Edit Profile Settings</h2>
  
  <div class="avatar-preview-box">
    <!-- Al hacer clic aquí se abrirá tu galería -->
    <div class="avatar-wrapper" onclick="triggerFileInput()">
      <img id="avatarPreview" class="p-avatar" src="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='%23666'%3E%3Cpath d='M12 12c2.21 0 4-1.79 4-4s-1.79-4-4-4-4 1.79-4 4 1.79 4 4 4zm0 2c-2.67 0-8 1.34-8 4v2h16v-2c0-2.66-5-3.33-8-3.33z'/%3E%3C/svg%3E">
    </div>
    <!-- Input oculto para cargar el archivo -->
    <input type="file" id="fileInput" accept="image/*" onchange="processSelectedFile(this)">
    
    <div>
      <p style="font-size: 14px; font-weight: 600; margin-bottom: 2px;">Profile Identity Image</p>
      <p style="font-size: 11px; color: var(--muted);">Click the circle to upload a picture from your device gallery.</p>
    </div>
  </div>

  <label>Profile Display Name</label>
  <input type="text" id="profileName" placeholder="Enter custom alias">

  <div class="actions">
    <a href="dashboard.html" class="btn btn-cancel">Cancel</a>
    <button class="btn btn-save" onclick="saveProfileChanges()">Save Changes</button>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
const activeUser = localStorage.getItem("logged_user");
if(!activeUser) { window.location.href = "login.html"; }

// Variable global para almacenar temporalmente la foto en Base64
let base64ImageString = "";

function showToast(msg) { const t = document.getElementById('toast'); t.textContent = msg; t.classList.add('show'); setTimeout(() => t.classList.remove('show'), 2200); }

// Simula el clic en el input de tipo archivo oculto
function triggerFileInput() {
  document.getElementById("fileInput").click();
}

// Procesa la foto de la galería y la convierte en texto Base64 duradero
function processSelectedFile(input) {
  const file = input.files[0];
  if (!file) return;

  // Validación rápida de tamaño
  if (file.size > 1500000) {
    showToast("⚠️ Image too large. Please select one under 1.5MB.");
    input.value = "";
    return;
  }

  const reader = new FileReader();
  reader.onload = function(e) {
    base64ImageString = e.target.result;
    document.getElementById("avatarPreview").src = base64ImageString;
  };
  reader.readAsDataURL(file);
}

// ── COMPROBACIÓN INTELIGENTE: CUENTAS NUEVAS Y VIEJAS ──
const users = JSON.parse(localStorage.getItem("vault_users")) || {};

// Si la cuenta existe y tiene sub-propiedades configuradas
if (users[activeUser]) {
  document.getElementById("profileName").value = users[activeUser].displayName || activeUser;
  if (users[activeUser].avatarUrl) {
    document.getElementById("avatarPreview").src = users[activeUser].avatarUrl;
    base64ImageString = users[activeUser].avatarUrl;
  }
} else {
  // Si la cuenta es vieja y no tiene nodo, ponemos el nombre limpio por defecto
  document.getElementById("profileName").value = activeUser;
}

function saveProfileChanges() {
  const targetName = document.getElementById("profileName").value.trim();
  
  if(!targetName) return showToast("⚠️ Display Name cannot be empty");

  let usersObj = JSON.parse(localStorage.getItem("vault_users")) || {};
  
  // SOLUCIÓN AL QUEBRANTAMIENTO: Si el nodo del usuario no existe (cuenta vieja o nueva), lo creamos vacío
  if (!usersObj[activeUser]) {
    usersObj[activeUser] = {};
  }
  
  // Guardamos los datos de forma segura
  usersObj[activeUser].displayName = targetName;
  usersObj[activeUser].avatarUrl = base64ImageString; 
  
  localStorage.setItem("vault_users", JSON.stringify(usersObj));
  
  showToast("✓ Profile changes updated successfully!");
  setTimeout(() => { window.location.href = "dashboard.html"; }, 1200);
}
</script>
</body>
</html>
