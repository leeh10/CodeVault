<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>CodeVault</title>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;600;700&family=Space+Grotesk:wght@300;400;600;700&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #080808;
  --surface: #0f0f0f;
  --surface2: #161616;
  --border: #242424;
  --border2: #2e2e2e;
  --text: #f0f0f0;
  --muted: #555;
  --accent: #ffffff;
  --accent2: #c8c8c8;
  --glow: rgba(255,255,255,0.04);
}

* { margin:0; padding:0; box-sizing:border-box; }

html { scroll-behavior: smooth; }

body {
  background: var(--bg);
  color: var(--text);
  font-family: 'Space Grotesk', sans-serif;
  min-height: 100vh;
  overflow-x: hidden;
  position: relative;
}

/* ── CANVAS PARTICLES ── */
#canvas {
  position: fixed;
  inset: 0;
  z-index: 0;
  pointer-events: none;
}

/* ── GRAIN OVERLAY ── */
body::before {
  content:'';
  position:fixed;
  inset:0;
  z-index:1;
  pointer-events:none;
  background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.04'/%3E%3C/svg%3E");
  background-size: 200px;
  opacity: 0.5;
}

/* ── LAYOUT ── */
.container {
  position: relative;
  z-index: 2;
  max-width: 860px;
  margin: 0 auto;
  padding: 60px 24px 80px;
}

/* ── HEADER ── */
header {
  margin-bottom: 56px;
  animation: fadeUp 0.8s cubic-bezier(.16,1,.3,1) both;
}

.logo-wrap {
  display: flex;
  align-items: center;
  gap: 14px;
  margin-bottom: 10px;
}

.logo-icon {
  width: 38px;
  height: 38px;
  background: var(--surface2);
  border: 1px solid var(--border2);
  border-radius: 10px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 18px;
}

.logo {
  font-family: 'JetBrains Mono', monospace;
  font-size: 32px;
  font-weight: 700;
  letter-spacing: -1px;
  color: var(--text);
}

.logo span {
  color: var(--muted);
}

.subtitle {
  font-family: 'JetBrains Mono', monospace;
  font-size: 13px;
  color: var(--muted);
  letter-spacing: 0.05em;
  padding-left: 52px;
}

/* ── EDITOR CARD ── */
.editor-card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 16px;
  overflow: hidden;
  animation: fadeUp 0.8s 0.1s cubic-bezier(.16,1,.3,1) both;
  transition: border-color 0.3s;
}

.editor-card:focus-within {
  border-color: var(--border2);
}

/* topbar */
.topbar {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 14px 20px;
  border-bottom: 1px solid var(--border);
  background: var(--surface2);
}

.topbar-left {
  display: flex;
  align-items: center;
  gap: 10px;
}

.dot { width: 10px; height: 10px; border-radius: 50%; }
.dot.r { background: #3d1c1c; }
.dot.y { background: #3d351c; }
.dot.g { background: #1c3d29; }

.lang-badge {
  font-family: 'JetBrains Mono', monospace;
  font-size: 11px;
  color: var(--muted);
  background: var(--border);
  padding: 3px 10px;
  border-radius: 20px;
  letter-spacing: 0.05em;
}

.line-count {
  font-family: 'JetBrains Mono', monospace;
  font-size: 11px;
  color: var(--muted);
}

textarea {
  width: 100%;
  height: 420px;
  background: transparent;
  color: var(--text);
  border: none;
  outline: none;
  padding: 24px;
  resize: none;
  font-family: 'JetBrains Mono', monospace;
  font-size: 13.5px;
  line-height: 1.75;
  letter-spacing: 0.01em;
  caret-color: white;
}

textarea::placeholder {
  color: #333;
}

textarea::-webkit-scrollbar { width: 6px; }
textarea::-webkit-scrollbar-track { background: transparent; }
textarea::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 3px; }

/* ── ACTIONS ── */
.actions {
  display: flex;
  gap: 10px;
  padding: 16px 20px;
  border-top: 1px solid var(--border);
  background: var(--surface2);
}

.btn {
  display: inline-flex;
  align-items: center;
  gap: 7px;
  border: none;
  border-radius: 9px;
  padding: 10px 18px;
  font-family: 'Space Grotesk', sans-serif;
  font-size: 13px;
  font-weight: 600;
  cursor: pointer;
  transition: all 0.2s;
  position: relative;
  overflow: hidden;
}

.btn::after {
  content: '';
  position: absolute;
  inset: 0;
  background: white;
  opacity: 0;
  transition: opacity 0.15s;
  border-radius: inherit;
}

.btn:active::after { opacity: 0.1; }

.btn-primary {
  background: var(--text);
  color: #080808;
}

.btn-primary:hover {
  background: var(--accent2);
  transform: translateY(-1px);
  box-shadow: 0 8px 24px rgba(255,255,255,0.1);
}

.btn-ghost {
  background: transparent;
  color: var(--muted);
  border: 1px solid var(--border2);
}

.btn-ghost:hover {
  color: var(--text);
  border-color: #444;
  transform: translateY(-1px);
}

.btn svg {
  width: 14px;
  height: 14px;
  flex-shrink: 0;
}

/* ── RESULT PANEL ── */
.result {
  margin-top: 20px;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 14px;
  padding: 0;
  display: none;
  overflow: hidden;
  animation: fadeUp 0.4s cubic-bezier(.16,1,.3,1) both;
}

.result-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 14px 20px;
  border-bottom: 1px solid var(--border);
  background: var(--surface2);
  font-size: 12px;
  color: var(--muted);
  font-family: 'JetBrains Mono', monospace;
}

.result-header .status {
  display: flex;
  align-items: center;
  gap: 7px;
}

.status-dot {
  width: 7px;
  height: 7px;
  border-radius: 50%;
  background: #3d3d3d;
  transition: background 0.4s;
}

.status-dot.active {
  background: #4caf50;
  box-shadow: 0 0 8px #4caf5066;
  animation: pulse-dot 2s infinite;
}

@keyframes pulse-dot {
  0%,100% { box-shadow: 0 0 8px #4caf5066; }
  50% { box-shadow: 0 0 16px #4caf5099; }
}

.result-body {
  padding: 20px;
}

/* Loadstring block */
.loadstring-wrap {
  background: var(--surface2);
  border: 1px solid var(--border2);
  border-radius: 10px;
  overflow: hidden;
  margin-bottom: 14px;
}

.loadstring-label {
  font-family: 'JetBrains Mono', monospace;
  font-size: 10px;
  color: var(--muted);
  letter-spacing: 0.1em;
  padding: 10px 16px 8px;
  border-bottom: 1px solid var(--border);
  text-transform: uppercase;
}

.loadstring-code {
  font-family: 'JetBrains Mono', monospace;
  font-size: 12.5px;
  color: var(--accent2);
  padding: 14px 16px;
  word-break: break-all;
  line-height: 1.6;
  user-select: all;
}

.copy-loadstring-btn {
  width: 100%;
  background: transparent;
  border: none;
  border-top: 1px solid var(--border);
  color: var(--muted);
  padding: 11px;
  font-family: 'Space Grotesk', sans-serif;
  font-size: 12px;
  font-weight: 600;
  cursor: pointer;
  transition: all 0.2s;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 7px;
}

.copy-loadstring-btn:hover {
  background: var(--border);
  color: var(--text);
}

.copy-loadstring-btn.copied {
  color: #4caf50;
}

.copy-loadstring-btn svg {
  width: 13px;
  height: 13px;
}

/* share row */
.share-row {
  display: flex;
  align-items: center;
  gap: 10px;
  margin-top: 12px;
}

.share-url {
  flex: 1;
  background: var(--surface2);
  border: 1px solid var(--border2);
  border-radius: 8px;
  padding: 10px 14px;
  font-family: 'JetBrains Mono', monospace;
  font-size: 12px;
  color: var(--muted);
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}

/* ── TOAST ── */
.toast {
  position: fixed;
  bottom: 30px;
  left: 50%;
  transform: translateX(-50%) translateY(20px);
  background: var(--text);
  color: #080808;
  font-family: 'Space Grotesk', sans-serif;
  font-size: 13px;
  font-weight: 600;
  padding: 12px 22px;
  border-radius: 10px;
  pointer-events: none;
  opacity: 0;
  transition: all 0.35s cubic-bezier(.16,1,.3,1);
  z-index: 100;
  white-space: nowrap;
}

.toast.show {
  opacity: 1;
  transform: translateX(-50%) translateY(0);
}

/* ── ANIMATIONS ── */
@keyframes fadeUp {
  from { opacity:0; transform: translateY(20px); }
  to   { opacity:1; transform: translateY(0); }
}

/* ── FOOTER ── */
footer {
  margin-top: 48px;
  text-align: center;
  font-family: 'JetBrains Mono', monospace;
  font-size: 11px;
  color: #2a2a2a;
  animation: fadeUp 0.8s 0.3s cubic-bezier(.16,1,.3,1) both;
}
</style>
</head>
<body>

<canvas id="canvas"></canvas>

<div class="container">

  <header>
    <div class="logo-wrap">
      <div class="logo-icon">⬡</div>
      <div class="logo">Code<span>Vault</span></div>
    </div>
    <div class="subtitle">// store &amp; share lua scripts</div>
  </header>

  <div class="editor-card">
    <div class="topbar">
      <div class="topbar-left">
        <div class="dot r"></div>
        <div class="dot y"></div>
        <div class="dot g"></div>
        <span class="lang-badge">LUA</span>
      </div>
      <span class="line-count" id="lineCount">0 lines</span>
    </div>

    <textarea
      id="code"
      placeholder="-- Paste your Lua script here..."
      spellcheck="false"
    ></textarea>

    <div class="actions">
      <button class="btn btn-primary" onclick="saveScript()">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2z"/><polyline points="17,21 17,13 7,13 7,21"/><polyline points="7,3 7,8 15,8"/></svg>
        Save Script
      </button>
      <button class="btn btn-ghost" onclick="copyCode()">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg>
        Copy Code
      </button>
      <button class="btn btn-ghost" onclick="clearEditor()">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="3,6 5,6 21,6"/><path d="M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6"/><path d="M10 11v6"/><path d="M14 11v6"/></svg>
        Clear
      </button>
    </div>
  </div>

  <div id="result" class="result">
    <div class="result-header">
      <div class="status">
        <div class="status-dot active" id="statusDot"></div>
        <span>Script saved</span>
      </div>
      <span id="scriptId"></span>
    </div>
    <div class="result-body">

      <div class="loadstring-wrap">
        <div class="loadstring-label">loadstring · ready to execute</div>
        <div class="loadstring-code" id="loadstringCode"></div>
        <button class="copy-loadstring-btn" id="copyLsBtn" onclick="copyLoadstring()">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg>
          Copy Loadstring
        </button>
      </div>

      <div class="share-row">
        <div class="share-url" id="shareUrl"></div>
        <button class="btn btn-ghost" onclick="copyUrl()" style="flex-shrink:0;font-size:12px;padding:10px 14px;">
          Copy URL
        </button>
      </div>

    </div>
  </div>

  <footer>© 2026 CodeVault — all scripts encrypted at rest</footer>

</div>

<div class="toast" id="toast"></div>

<script>
/* ─────────────────────────────────────────
   PARTICLES
───────────────────────────────────────── */
const canvas = document.getElementById('canvas');
const ctx = canvas.getContext('2d');
let W, H, particles = [];

function resize() {
  W = canvas.width  = window.innerWidth;
  H = canvas.height = window.innerHeight;
}
resize();
window.addEventListener('resize', resize);

class Particle {
  constructor() { this.reset(true); }
  reset(init) {
    this.x  = Math.random() * W;
    this.y  = init ? Math.random() * H : H + 10;
    this.vx = (Math.random() - 0.5) * 0.25;
    this.vy = -(Math.random() * 0.3 + 0.05);
    this.r  = Math.random() * 1.2 + 0.3;
    this.alpha = Math.random() * 0.35 + 0.05;
    this.life  = 0;
    this.maxLife = Math.random() * 600 + 300;
  }
  update() {
    this.x += this.vx;
    this.y += this.vy;
    this.life++;
    if (this.life > this.maxLife || this.y < -10) this.reset(false);
  }
  draw() {
    const progress = this.life / this.maxLife;
    const fade = progress < 0.1 ? progress / 0.1 : progress > 0.8 ? 1 - (progress - 0.8) / 0.2 : 1;
    ctx.beginPath();
    ctx.arc(this.x, this.y, this.r, 0, Math.PI * 2);
    ctx.fillStyle = `rgba(255,255,255,${this.alpha * fade})`;
    ctx.fill();
  }
}

for (let i = 0; i < 130; i++) particles.push(new Particle());

/* connecting lines between nearby particles */
function drawConnections() {
  const maxDist = 100;
  for (let i = 0; i < particles.length; i++) {
    for (let j = i + 1; j < particles.length; j++) {
      const dx = particles[i].x - particles[j].x;
      const dy = particles[i].y - particles[j].y;
      const dist = Math.sqrt(dx*dx + dy*dy);
      if (dist < maxDist) {
        const op = (1 - dist / maxDist) * 0.04;
        ctx.beginPath();
        ctx.moveTo(particles[i].x, particles[i].y);
        ctx.lineTo(particles[j].x, particles[j].y);
        ctx.strokeStyle = `rgba(255,255,255,${op})`;
        ctx.lineWidth = 0.5;
        ctx.stroke();
      }
    }
  }
}

function animate() {
  ctx.clearRect(0, 0, W, H);
  drawConnections();
  particles.forEach(p => { p.update(); p.draw(); });
  requestAnimationFrame(animate);
}
animate();

/* ─────────────────────────────────────────
   LINE COUNT
───────────────────────────────────────── */
const codeEl   = document.getElementById('code');
const lineCount = document.getElementById('lineCount');

codeEl.addEventListener('input', () => {
  const lines = codeEl.value.split('\n').length;
  lineCount.textContent = `${lines} line${lines === 1 ? '' : 's'}`;
});

/* ─────────────────────────────────────────
   TOAST
───────────────────────────────────────── */
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2200);
}

/* ─────────────────────────────────────────
   SAVE SCRIPT
───────────────────────────────────────── */
function saveScript() {
  const code = codeEl.value.trim();
  if (!code) { showToast('⚠ Paste a script first'); return; }

  const id = Math.random().toString(36).slice(2, 10).toUpperCase();
  const fakeUrl = `https://codevault.gg/s/${id}`;
  const ls = `loadstring(game:HttpGet("${fakeUrl}"))()`;

  document.getElementById('loadstringCode').textContent = ls;
  document.getElementById('shareUrl').textContent = fakeUrl;
  document.getElementById('scriptId').textContent = `#${id}`;

  const result = document.getElementById('result');
  result.style.display = 'block';

  showToast('✓ Script saved');
}

/* ─────────────────────────────────────────
   COPY LOADSTRING
───────────────────────────────────────── */
function copyLoadstring() {
  const ls = document.getElementById('loadstringCode').textContent;
  navigator.clipboard.writeText(ls).then(() => {
    const btn = document.getElementById('copyLsBtn');
    btn.classList.add('copied');
    btn.querySelector('span') && (btn.querySelector('span').textContent = 'Copied!');
    btn.innerHTML = `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="20,6 9,17 4,12"/></svg> Copied!`;
    showToast('✓ Loadstring copied');
    setTimeout(() => {
      btn.innerHTML = `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg> Copy Loadstring`;
      btn.classList.remove('copied');
    }, 2000);
  });
}

/* ─────────────────────────────────────────
   COPY CODE
───────────────────────────────────────── */
function copyCode() {
  const code = codeEl.value;
  if (!code.trim()) { showToast('⚠ Nothing to copy'); return; }
  navigator.clipboard.writeText(code).then(() => showToast('✓ Code copied'));
}

/* ─────────────────────────────────────────
   COPY URL
───────────────────────────────────────── */
function copyUrl() {
  const url = document.getElementById('shareUrl').textContent;
  navigator.clipboard.writeText(url).then(() => showToast('✓ URL copied'));
}

/* ─────────────────────────────────────────
   CLEAR
───────────────────────────────────────── */
function clearEditor() {
  codeEl.value = '';
  lineCount.textContent = '0 lines';
  document.getElementById('result').style.display = 'none';
  showToast('Editor cleared');
}
</script>
</body>
</html>
