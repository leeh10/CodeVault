<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">

<title>CodeVault</title>

<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono&display=swap" rel="stylesheet">

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    background:#0b0b0b;
    color:white;
    font-family:JetBrains Mono, monospace;
    min-height:100vh;
    padding:30px;
}

.container{
    max-width:1000px;
    margin:auto;
}

.logo{
    font-size:42px;
    font-weight:bold;
    margin-bottom:10px;
}

.subtitle{
    color:#888;
    margin-bottom:25px;
}

textarea{
    width:100%;
    height:500px;

    background:#121212;
    color:#00ff88;

    border:1px solid #222;

    border-radius:12px;

    padding:20px;

    resize:none;

    font-family:JetBrains Mono, monospace;
    font-size:14px;
}

.actions{
    margin-top:15px;
    display:flex;
    gap:10px;
}

button{
    background:#00ff88;
    color:black;

    border:none;

    padding:12px 20px;

    border-radius:10px;

    cursor:pointer;

    font-weight:bold;
}

button:hover{
    opacity:.8;
}

.result{
    margin-top:20px;

    background:#121212;

    border:1px solid #222;

    border-radius:10px;

    padding:15px;

    display:none;
}

.link{
    color:#00ff88;
    word-break:break-all;
}

</style>
</head>

<body>

<div class="container">

<div class="logo">
CodeVault
</div>

<div class="subtitle">
Store and share Lua scripts
</div>

<textarea
id="code"
placeholder="Paste your Lua script here..."
></textarea>

<div class="actions">

<button onclick="saveScript()">
Save Script
</button>

<button onclick="copyCode()">
Copy
</button>

</div>

<div id="result" class="result"></div>

</div>

<script src="script.js"></script>

</body>
</html>
