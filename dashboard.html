<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>CodeVault — Premium Dashboard</title>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;500;600;700&family=Space+Grotesk:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #040404;
  --surface: #0a0a0a;
  --surface2: #121212;
  --border: #1c1c1c;
  --border2: #282828;
  --text: #f5f5f5;
  --muted: #666666;
  --accent: #ffffff;
  --accent-dim: #a3a3a3;
  --danger: #ef4444;
  --danger-bg: rgba(239, 68, 68, 0.07);
}

* { margin:0; padding:0; box-sizing:border-box; }
body {
  background: var(--bg);
  color: var(--text);
  font-family: 'Space Grotesk', sans-serif;
  min-height: 100vh;
  overflow-x: hidden;
  position: relative;
}

#canvas { position: fixed; inset: 0; z-index: 0; pointer-events: none; }
body::before {
  content:''; position:fixed; inset:0; z-index:1; pointer-events:none;
  background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.03'/%3E%3C/svg%3E");
  background-size: 200px; opacity: 0.4;
}

.container { position: relative; z-index: 2; max-width: 1100px; margin: 0 auto; padding: 40px 24px; }

/* HEADER */
header {
  display: flex; justify-content: space-between; align-items: center;
  margin-bottom: 40px; animation: fadeUp 0.6s cubic-bezier(.16,1,.3,1) both;
  background: rgba(10, 10, 10, 0.5); padding: 16px 24px; border-radius: 14px;
  border: 1px solid var(--border); backdrop-filter: blur(8px);
}
.logo-wrap { display: flex; align-items: center; gap: 12px; text-decoration: none; color: var(--text); }
.logo-icon {
  width: 32px; height: 32px; background: var(--surface2); border: 1px solid var(--border2);
  border-radius: 8px; display: flex; align-items: center; justify-content: center; font-size: 15px; color: var(--text);
}
.logo { font-family: 'JetBrains Mono', monospace; font-size: 24px; font-weight: 700; letter-spacing: -1px; }
.logo span { color: var(--muted); }

/* AUTH BOXES */
.auth-box {
  max-width: 420px; margin: 100px auto; background: var(--surface);
  border: 1px solid var(--border); border-radius: 16px; padding: 40px 32px;
  box-shadow: 0 30px 60px rgba(0,0,0,0.6);
  animation: fadeUp 0.7s cubic-bezier(.16,1,.3,1) both;
}
.auth-box h2 { font-family: 'JetBrains Mono', monospace; font-size: 20px; font-weight: 600; margin-bottom: 24px; letter-spacing: -0.5px; }
.auth-box input {
  width: 100%; padding: 14px 16px; margin-bottom: 16px; background: var(--surface2);
  border: 1px solid var(--border); border-radius: 8px; color: white;
  font-family: 'JetBrains Mono', monospace; font-size: 13px; transition: all 0.2s;
}
.auth-box input:focus { border-color: var(--border2); background: #161616; outline: none; }
.auth-link { color: var(--muted); font-size: 13px; cursor: pointer; text-decoration: none; margin-top: 18px; display: inline-block; transition: color 0.2s; }
.auth-link:hover { color: var(--text); text-decoration: underline; }

/* LAYOUT DASHBOARD */
.dashboard-layout { display: none; grid-template-columns: 280px 1fr; gap: 24px; animation: fadeUp 0.7s 0.1s cubic-bezier(.16,1,.3,1) both; }

@media (max-width: 768px) {
  .dashboard-layout { grid-template-columns: 1fr; }
}

.sidebar { background: var(--surface); border: 1px solid var(--border); border-radius: 16px; padding: 24px; display: flex; flex-direction: column; gap: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.2); }
.sidebar h3 { font-family: 'JetBrains Mono', monospace; font-size: 11px; color: var(--muted); text-transform: uppercase; letter-spacing: 0.15em; font-weight: 600; }

.folder-list { list-style: none; }
.folder-item {
  padding: 12px 14px; background: transparent; border: 1px solid transparent;
  border-radius: 8px; margin-bottom: 8px; cursor: pointer;
  display: flex; justify-content: space-between; align-items: center; font-size: 14px; transition: all 0.2s ease;
}
.folder-item:hover { background: var(--surface2); border-color: var(--border); }
.folder-item.active { border-color: var(--border2); background: var(--surface2); font-weight: 500; }
.folder-item span { display: flex; align-items: center; gap: 10px; width: 100%; }

.delete-btn { background: transparent; color: #444; border: none; cursor: pointer; font-size: 13px; padding: 4px 8px; border-radius: 4px; transition: all 0.2s; }
.delete-btn:hover { color: var(--danger); background: var(--danger-bg); }

.main-content { background: var(--surface); border: 1px solid var(--border); border-radius: 16px; padding: 32px; min-height: 500px; box-shadow: 0 10px 30px rgba(0,0,0,0.2); }
.content-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 28px; border-bottom: 1px solid var(--border); padding-bottom: 20px; }
.script-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(250px, 1fr)); gap: 16px; }

/* CARDS DE SCRIPTS */
.script-card {
  background: var(--surface2); border: 1px solid var(--border); border-radius: 12px;
  padding: 20px; display: flex; flex-direction: column; justify-content: space-between; min-height: 155px; transition: all 0.25s cubic-bezier(.16,1,.3,1);
}
.script-card:hover { border-color: var(--border2); transform: translateY(-2px); box-shadow: 0 12px 24px rgba(0,0,0,0.4); }
.script-card h4 { font-family: 'JetBrains Mono', monospace; font-size: 15px; font-weight: 600; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; color: #fff; }
.script-card p { font-family: 'JetBrains Mono', monospace; color: var(--muted); font-size: 11px; margin-top: 4px; }
.card-actions { display: flex; gap: 8px; margin-top: auto; }

/* BUTTONS */
.btn {
  display: inline-flex; align-items: center; justify-content: center; gap: 7px; border: none; border-radius: 8px;
  padding: 10px 16px; font-family: 'Space Grotesk', sans-serif; font-size: 13px; font-weight: 600; cursor: pointer; transition: all 0.2s ease;
}
.btn-primary { background: var(--text); color: #040404; }
.btn-primary:hover { background: var(--accent-dim); transform: translateY(-1px); }
.btn-ghost { background: transparent; color: var(--accent-dim); border: 1px solid var(--border2); }
.btn-ghost:hover { color: var(--text); border-color: #555; }
.btn-danger { background: transparent; color: var(--muted); border: 1px solid var(--border); }
.btn-danger:hover { color: var(--danger); border-color: rgba(239, 68, 68, 0.2); background: var(--danger-bg); }

.logout-btn { background: transparent; color: var(--muted); border: 1px solid var(--border); padding: 8px 14px; border-radius: 8px; font-size: 12px; font-weight: 600; cursor: pointer; transition: all 0.2s; }
.logout-btn:hover { color: var(--danger); border-color: rgba(239, 68, 68, 0.2); }

/* TOAST */
.toast {
  position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%) translateY(20px);
  background: var(--text); color: #040404; font-family: 'Space Grotesk', sans-serif;
  font-size: 13px; font-weight: 600; padding: 12px 22px; border-radius: 8px;
  pointer-events: none; opacity: 0; transition: all 0.3s cubic-bezier(.16,1,.3,1); z-index: 100;
  box-shadow: 0 10px 30px rgba(0,0,0,0.5);
}
.toast.show { opacity:1; transform:translateX(-50%) translateY(0); }

/* ANIMATIONS */
@keyframes fadeUp { from { opacity:0; transform: translateY(15px); } to { opacity:1; transform: translateY(0); } }
</style>
</head>
<body>

<canvas id="canvas"></canvas>

<div class="container">
  <header>
    <a class="logo-wrap" href="#">
      <div class="logo-icon">⬡</div>
      <div class="logo">Code<span>Vault</span></div>
    </a>
    
    <div style="display: flex; gap: 10px; align-items: center;">
      <a href="index.html?from=dashboard" class="btn btn-ghost" id="btnEditorGlobal" style="display: none; padding: 8px 14px; font-size: 12px;">
        ⚙️ Open Editor
      </a>
      <button id="logoutBtn" class="logout-btn" style="display:none;" onclick="logout()">Logout</button>
    </div>
  </header>

  <!-- LOGIN -->
  <div id="screenLogin" class="auth-box">
    <h2>Device Login</h2>
    <input type="text" id="loginUser" placeholder="Username">
    <input type="password" id="loginPass" placeholder="Password">
    <button class="btn btn-primary" style="width: 100%; margin-top: 5px;" onclick="login()">Unlock Vault</button>
    <span class="auth-link" onclick="showScreen('Register')">Create a new account profile</span>
  </div>

  <!-- REGISTER -->
  <div id="screenRegister" class="auth-box" style="display: none;">
    <h2>Create Profile</h2>
    <input type="text" id="regUser" placeholder="Choose Username">
    <input type="password" id="regPass" placeholder="Choose Password">
    <button class="btn btn-primary" style="width: 100%; margin-top: 5px;" onclick="register()">Sign Up</button>
    <span class="auth-link" onclick="showScreen('Login')">Back to Login</span>
  </div>

  <!-- DASHBOARD PRINCIPAL -->
  <div id="screenDashboard" class="dashboard-layout">
    <div class="sidebar">
      <h3>📂 Folders</h3>
      <ul id="folderList" class="folder-list"></ul>
      <button class="btn btn-ghost" style="width: 100%;" onclick="createNewFolder()">+ New Folder</button>
    </div>

    <div class="main-content">
      <div class="content-header">
        <h3 id="currentFolderName" style="font-family:'JetBrains Mono'; font-size:14px; color:var(--muted); font-weight:500;">Select a folder layout</h3>
        <button id="newScriptBtn" class="btn btn-primary" style="display: none;" onclick="goToEditorForNewScript()">+ Add Script</button>
      </div>
      <div id="scriptGrid" class="script-grid"></div>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
/* Particle Engine */
const canvas = document.getElementById('canvas'); const ctx = canvas.getContext('2d'); let W, H;
function resize() { W = canvas.width = innerWidth; H = canvas.height = innerHeight; } resize(); addEventListener('resize', resize);
class Particle {
  constructor() { this.reset(true); }
  reset(init) {
    this.x = Math.random() * W; this.y = init ? Math.random() * H : H + 10;
    this.vx = (Math.random() - 0.5) * 0.2; this.vy = -(Math.random() * 0.25 + 0.05);
    this.r = Math.random() * 1 + 0.4; this.alpha = Math.random() * 0.3 + 0.05; this.life = 0; this.maxLife = Math.random() * 600 + 300;
  }
  update() { this.x += this.vx; this.y += this.vy; this.life++; if (this.life > this.maxLife || this.y < -10) this.reset(false); }
  draw() { const p = this.life / this.maxLife; const fade = p < 0.1 ? p/0.1 : p > 0.8 ? 1-(p-0.8)/0.2 : 1; ctx.beginPath(); ctx.arc(this.x, this.y, this.r, 0, Math.PI*2); ctx.fillStyle = 'rgba(255,255,255,' + (this.alpha * fade) + ')'; ctx.fill(); }
}
const particles = Array.from({length:80}, () => new Particle());
(function animate() {
  ctx.clearRect(0,0,W,H);
  for (let i=0;i<particles.length;i++) {
    for (let j=i+1;j<particles.length;j++) {
      const dx=particles[i].x-particles[j].x, dy=particles[i].y-particles[j].y; const d=Math.sqrt(dx*dx+dy*dy);
      if(d<90){ ctx.beginPath(); ctx.moveTo(particles[i].x,particles[i].y); ctx.lineTo(particles[j].x,particles[j].y); ctx.strokeStyle='rgba(255,255,255,'+(1-d/90)*0.02+')'; ctx.lineWidth=0.5; ctx.stroke(); }
    }
  }
  particles.forEach(p => { p.update(); p.draw(); }); requestAnimationFrame(animate);
})();

/* Vault Core System */
let currentFolderId = null;

// Inicializadores Locales Asegurados
if(!localStorage.getItem("vault_users")) localStorage.setItem("vault_users", JSON.stringify({}));
if(!localStorage.getItem("vault_folders")) localStorage.setItem("vault_folders", JSON.stringify([]));
if(!localStorage.getItem("vault_scripts")) localStorage.setItem("vault_scripts", JSON.stringify([]));

function showToast(msg) { const t = document.getElementById('toast'); t.textContent = msg; t.classList.add('show'); setTimeout(() => t.classList.remove('show'), 2200); }


// CORREGIDO: Ahora lee de localStorage para mantener sesión indefinidamente
function getLoggedUser() { return localStorage.getItem("logged_user"); }

function showScreen(screen) {
  document.getElementById("screenLogin").style.display = screen === 'Login' ? 'block' : 'none';
  document.getElementById("screenRegister").style.display = screen === 'Register' ? 'block' : 'none';
  document.getElementById("screenDashboard").style.display = screen === 'Dashboard' ? 'grid' : 'none';
  document.getElementById("logoutBtn").style.display = screen === 'Dashboard' ? 'block' : 'none';
  document.getElementById("btnEditorGlobal").style.display = screen === 'Dashboard' ? 'inline-flex' : 'none';
}

function register() {
  const user = document.getElementById("regUser").value.trim(); const pass = document.getElementById("regPass").value.trim();
  if(!user || !pass) return showToast("⚠️ Fill all fields");
  let users = JSON.parse(localStorage.getItem("vault_users"));
  if(users[user]) return showToast("⚠️ Username taken");
  users[user] = pass; localStorage.setItem("vault_users", JSON.stringify(users));
  showToast("✓ Registered successfully!"); showScreen('Login');
}

function login() {
  const user = document.getElementById("loginUser").value.trim(); const pass = document.getElementById("loginPass").value.trim();
  let users = JSON.parse(localStorage.getItem("vault_users"));
  if(users[user] && users[user] === pass) {
    // CORREGIDO: Guardado en localStorage para persistencia al recargar
    localStorage.setItem("logged_user", user); 
    showScreen('Dashboard'); 
    renderFolders();
  } else { showToast("⚠️ Invalid login credentials"); }
}

function logout() {
  localStorage.removeItem("logged_user"); currentFolderId = null;
  document.getElementById("scriptGrid").innerHTML = ""; document.getElementById("currentFolderName").innerText = "Select a folder layout";
  document.getElementById("newScriptBtn").style.display = "none"; showScreen('Login');
}

function renderFolders() {
  const user = getLoggedUser(); const folders = JSON.parse(localStorage.getItem("vault_folders"));
  const listElement = document.getElementById("folderList"); listElement.innerHTML = "";
  const userFolders = folders.filter(f => f.username === user);
  userFolders.forEach(folder => {
    const li = document.createElement("li");
    li.className = `folder-item ${currentFolderId === folder.id ? 'active' : ''}`;
    li.innerHTML = `<span onclick="selectFolder('${folder.id}', '${folder.name}')">📁 ${folder.name}</span><button class="delete-btn" onclick="deleteFolder('${folder.id}', event)">✕</button>`;
    listElement.appendChild(li);
  });
}

function createNewFolder() {
  const name = prompt("Enter folder name:"); if(!name || !name.trim()) return;
  const folders = JSON.parse(localStorage.getItem("vault_folders"));
  folders.push({ id: "fold_" + Date.now(), name: name.trim(), username: getLoggedUser() });
  localStorage.setItem("vault_folders", JSON.stringify(folders)); renderFolders();
}

function deleteFolder(id, event) {
  event.stopPropagation(); if(!confirm("Delete folder and all its contents permanently?")) return;
  let folders = JSON.parse(localStorage.getItem("vault_folders"));
  localStorage.setItem("vault_folders", JSON.stringify(folders.filter(f => f.id !== id)));
  let scripts = JSON.parse(localStorage.getItem("vault_scripts"));
  localStorage.setItem("vault_scripts", JSON.stringify(scripts.filter(s => s.folderId !== id)));
  if(currentFolderId === id) { currentFolderId = null; document.getElementById("currentFolderName").innerText = "Select a folder layout"; document.getElementById("newScriptBtn").style.display = "none"; }
  renderFolders(); renderScripts();
}

function selectFolder(id, name) {
  currentFolderId = id; document.getElementById("currentFolderName").innerText = `📁 ${name}`;
  document.getElementById("newScriptBtn").style.display = "inline-flex"; renderFolders(); renderScripts();
}

function renderScripts() {
  const grid = document.getElementById("scriptGrid"); grid.innerHTML = ""; if(!currentFolderId) return;
  const scripts = JSON.parse(localStorage.getItem("vault_scripts"));
  const folderScripts = scripts.filter(s => s.folderId === currentFolderId);
  folderScripts.forEach(script => {
    const card = document.createElement("div"); card.className = "script-card";
    card.innerHTML = `<div><h4>${script.title}</h4><p>ID: ${script.id}</p></div>
      <div class="card-actions">
        <button class="btn btn-ghost" style="padding:6px 12px; font-size:11px; width:50%;" onclick="viewScript('${script.id}')">View/Edit</button>
        <button class="btn btn-danger" style="padding:6px 12px; font-size:11px; width:50%;" onclick="deleteScript('${script.id}')">Delete</button>
      </div>`;
    grid.appendChild(card);
  });
}

function goToEditorForNewScript() {
  // Guarda la carpeta activa para saber a dónde asociarlo al regresar
  localStorage.setItem("active_folder_target", currentFolderId);
  window.location.href = `index.html?from=dashboard&folderId=${currentFolderId}`;
}

function viewScript(id) {
  window.location.href = `view.html?id=${id}`;
}

function deleteScript(id) {
  if(!confirm("Delete this script?")) return;
  let scripts = JSON.parse(localStorage.getItem("vault_scripts"));
  localStorage.setItem("vault_scripts", JSON.stringify(scripts.filter(s => s.id !== id)));
  renderScripts(); showToast("✓ Script deleted locally");
}

// ── AUTOLOGIN AUTOMÁTICO AL RECARGAR PÁGINA ──
if(getLoggedUser()) { 
  showScreen('Dashboard'); 
  renderFolders(); 
} else {
  showScreen('Login');
}
</script>
</body>
</html>
