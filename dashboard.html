<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Dashboard - CodeVault</title>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono&display=swap" rel="stylesheet">
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body {
    background:#0b0b0b;
    color:white;
    font-family:'JetBrains Mono', monospace;
    min-height:100vh;
    padding:30px;
}
.container { max-width:1100px; margin:auto; }
.logo { font-size:42px; font-weight:bold; margin-bottom:5px; color:#00ff88; }
.subtitle { color:#888; margin-bottom:25px; font-size:14px; }

/* --- PANTALLAS DE LOGIN / REGISTER --- */
.auth-box {
    max-width: 400px;
    margin: 80px auto;
    background: #121212;
    border: 1px solid #222;
    border-radius: 12px;
    padding: 30px;
    text-align: center;
}
.auth-box h2 { margin-bottom: 20px; color: #00ff88; }
.auth-box input {
    width: 100%;
    padding: 12px;
    margin-bottom: 15px;
    background: #1a1a1a;
    border: 1px solid #333;
    border-radius: 8px;
    color: white;
    font-family: inherit;
}
.auth-box input:focus { border-color: #00ff88; outline: none; }
.auth-link { color: #888; font-size: 13px; cursor: pointer; text-decoration: underline; margin-top: 10px; display: inline-block; }
.auth-link:hover { color: #00ff88; }

/* --- PANEL PRINCIPAL (DASHBOARD) --- */
.dashboard-layout {
    display: none; /* Se activa con JS */
    grid-template-columns: 280px 1fr;
    gap: 30px;
}

/* Barra Lateral (Carpetas) */
.sidebar {
    background: #121212;
    border: 1px solid #222;
    border-radius: 12px;
    padding: 20px;
}
.sidebar h3 { font-size: 18px; margin-bottom: 15px; color: #888; }
.folder-list { list-style: none; margin-bottom: 20px; }
.folder-item {
    padding: 10px;
    background: #1a1a1a;
    border: 1px solid #252525;
    border-radius: 8px;
    margin-bottom: 8px;
    cursor: pointer;
    display: flex;
    justify-content: space-between;
    align-items: center;
    font-size: 14px;
}
.folder-item:hover, .folder-item.active {
    border-color: #00ff88;
    background: #14221a;
}
.delete-btn {
    background: transparent;
    color: #ff3344;
    padding: 2px 6px;
    font-size: 11px;
}

/* Área de Contenido (Scripts) */
.main-content {
    background: #121212;
    border: 1px solid #222;
    border-radius: 12px;
    padding: 25px;
}
.content-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 20px;
}
.script-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
    gap: 15px;
}
.script-card {
    background: #1a1a1a;
    border: 1px solid #252525;
    border-radius: 10px;
    padding: 15px;
    display: flex;
    flex-direction: column;
    justify-content: space-between;
    height: 140px;
}
.script-card h4 { color: #00ff88; font-size: 15px; margin-bottom: 5px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.script-card p { color: #666; font-size: 11px; margin-bottom: 15px; }
.card-actions { display: flex; gap: 5px; }

/* --- VENTANA MODAL (EDITOR DE SCRIPT) --- */
.modal {
    display: none;
    position: fixed;
    top:0; left:0; width:100%; height:100%;
    background: rgba(0,0,0,0.85);
    justify-content: center;
    align-items: center;
    padding: 20px;
    z-index: 100;
}
.modal-content {
    background: #121212;
    border: 1px solid #222;
    border-radius: 12px;
    max-width: 800px;
    width: 100%;
    padding: 25px;
}
textarea {
    width: 100%;
    height: 380px;
    background: #0b0b0b;
    color: #00ff88;
    border: 1px solid #222;
    border-radius: 8px;
    padding: 15px;
    resize: none;
    font-family: inherit;
    font-size: 13px;
    margin: 15px 0;
}

/* Botones del Sistema */
button {
    background: #00ff88;
    color: black;
    border: none;
    padding: 10px 15px;
    border-radius: 8px;
    cursor: pointer;
    font-weight: bold;
    font-family: inherit;
    font-size: 13px;
}
button:hover { opacity: .8; }
.btn-secondary { background: #222; color: #888; border: 1px solid #333; }
.btn-danger { background: #ff3344; color: white; }
.btn-loadstring { background: #ff0055; color: white; }
.logout-btn { background: #ff3344; color: white; padding: 6px 12px; font-size: 12px; }
</style>
</head>
<body>

<div class="container">
    
    <div style="display: flex; justify-content: space-between; align-items: center;">
        <div>
            <div class="logo">CodeVault</div>
            <div class="subtitle">Dispositivo Local Safe-System</div>
        </div>
        <button id="logoutBtn" class="logout-btn" style="display:none;" onclick="logout()">Logout</button>
    </div>

    <div id="screenRegister" class="auth-box" style="display: none;">
        <h2>Create Account</h2>
        <input type="text" id="regUser" placeholder="Choose Username">
        <input type="password" id="regPass" placeholder="Choose Password">
        <button style="width: 100%;" onclick="register()">Sign Up</button>
        <span class="auth-link" onclick="showScreen('Login')">Already have an account? Login</span>
    </div>

    <div id="screenLogin" class="auth-box">
        <h2>Device Identity Login</h2>
        <input type="text" id="loginUser" placeholder="Username">
        <input type="password" id="loginPass" placeholder="Password">
        <button style="width: 100%;" onclick="login()">Unlock Vault</button>
        <span class="auth-link" onclick="showScreen('Register')">New user on this device? Register</span>
    </div>

    <div id="screenDashboard" class="dashboard-layout">
        
        <div class="sidebar">
            <h3>📂 Folders</h3>
            <ul id="folderList" class="folder-list">
                </ul>
            <button style="width: 100%;" onclick="createNewFolder()">+ New Folder</button>
        </div>

        <div class="main-content">
            <div class="content-header">
                <h3 id="currentFolderName" style="color:#888;">Select a folder</h3>
                <button id="newScriptBtn" style="display: none;" onclick="openScriptModal(null)">+ Add Script</button>
            </div>
            <div id="scriptGrid" class="script-grid">
                </div>
        </div>

    </div>
</div>

<div id="scriptModal" class="modal">
    <div class="modal-content">
        <h3 id="modalTitle">Script Editor</h3>
        <input type="text" id="scriptTitleInput" placeholder="Script Name (e.g. AutoFarm)" style="width:100%; padding:10px; margin-top:10px; background:#0b0b0b; border:1px solid #222; color:white; border-radius:8px;">
        <textarea id="scriptTextInput" placeholder="Paste your Lua code here..."></textarea>
        <div style="display: flex; justify-content: space-between;">
            <div style="display: flex; gap: 8px;">
                <button onclick="saveScriptData()">Save Script</button>
                <button class="btn-secondary" onclick="closeScriptModal()">Cancel</button>
            </div>
            <button id="modalLoadstringBtn" class="btn-loadstring" style="display: none;">Copy Loadstring</button>
        </div>
    </div>
</div>

<script>
// --- CAPA DE DATOS EN LOCALSTORAGE ---
let currentFolderId = null;
let activeEditingScriptId = null;

// Estructura inicial por defecto si el almacén está vacío
if(!localStorage.getItem("vault_users")) localStorage.setItem("vault_users", JSON.stringify({}));
if(!localStorage.getItem("vault_folders")) localStorage.setItem("vault_folders", JSON.stringify([]));
if(!localStorage.getItem("vault_scripts")) localStorage.setItem("vault_scripts", JSON.stringify([]));

function showScreen(screen) {
    document.getElementById("screenLogin").style.display = screen === 'Login' ? 'block' : 'none';
    document.getElementById("screenRegister").style.display = screen === 'Register' ? 'block' : 'none';
    document.getElementById("screenDashboard").style.display = screen === 'Dashboard' ? 'grid' : 'none';
    document.getElementById("logoutBtn").style.display = screen === 'Dashboard' ? 'block' : 'none';
}

// --- SISTEMA DE AUTENTICACIÓN ---
function register() {
    const user = document.getElementById("regUser").value.trim();
    const pass = document.getElementById("regPass").value.trim();
    if(!user || !pass) return alert("Fill all fields");

    let users = JSON.parse(localStorage.getItem("vault_users"));
    if(users[user]) return alert("Username already registered on this device!");

    users[user] = pass;
    localStorage.setItem("vault_users", JSON.stringify(users));
    alert("Account created! Please login.");
    showScreen('Login');
}

function login() {
    const user = document.getElementById("loginUser").value.trim();
    const pass = document.getElementById("loginPass").value.trim();
    
    let users = JSON.parse(localStorage.getItem("vault_users"));
    if(users[user] && users[user] === pass) {
        sessionStorage.setItem("logged_user", user); // Guarda sesión activa temporal
        showScreen('Dashboard');
        renderFolders();
    } else {
        alert("Invalid login for this device.");
    }
}

function logout() {
    sessionStorage.removeItem("logged_user");
    currentFolderId = null;
    document.getElementById("scriptGrid").innerHTML = "";
    document.getElementById("currentFolderName").innerText = "Select a folder";
    document.getElementById("newScriptBtn").style.display = "none";
    showScreen('Login');
}

// --- LOGICA DE GESTIÓN DE CARPETAS ---
function getLoggedUser() { return sessionStorage.getItem("logged_user"); }

function renderFolders() {
    const user = getLoggedUser();
    const folders = JSON.parse(localStorage.getItem("vault_folders"));
    const listElement = document.getElementById("folderList");
    listElement.innerHTML = "";

    const userFolders = folders.filter(f => f.username === user);

    userFolders.forEach(folder => {
        const li = document.createElement("li");
        li.className = `folder-item ${currentFolderId === folder.id ? 'active' : ''}`;
        li.innerHTML = `
            <span onclick="selectFolder('${folder.id}', '${folder.name}')">📁 ${folder.name}</span>
            <button class="delete-btn" onclick="deleteFolder('${folder.id}', event)">X</button>
        `;
        listElement.appendChild(li);
    });
}

function createNewFolder() {
    const name = prompt("Enter folder name:");
    if(!name || !name.trim()) return;

    const folders = JSON.parse(localStorage.getItem("vault_folders"));
    const newFolder = {
        id: "fold_" + Date.now(),
        name: name.trim(),
        username: getLoggedUser()
    };

    folders.push(newFolder);
    localStorage.setItem("vault_folders", JSON.stringify(folders));
    renderFolders();
}

function deleteFolder(id, event) {
    event.stopPropagation(); // Evita seleccionar la carpeta al borrar
    if(!confirm("Are you sure you want to delete this folder and ALL scripts inside?")) return;

    let folders = JSON.parse(localStorage.getItem("vault_folders"));
    folders = folders.filter(f => f.id !== id);
    localStorage.setItem("vault_folders", JSON.stringify(folders));

    let scripts = JSON.parse(localStorage.getItem("vault_scripts"));
    scripts = scripts.filter(s => s.folderId !== id);
    localStorage.setItem("vault_scripts", JSON.stringify(scripts));

    if(currentFolderId === id) {
        currentFolderId = null;
        document.getElementById("currentFolderName").innerText = "Select a folder";
        document.getElementById("newScriptBtn").style.display = "none";
    }
    renderFolders();
    renderScripts();
}

function selectFolder(id, name) {
    currentFolderId = id;
    document.getElementById("currentFolderName").innerText = `📁 ${name}`;
    document.getElementById("newScriptBtn").style.display = "block";
    renderFolders();
    renderScripts();
}

// --- LOGICA DE GESTIÓN DE SCRIPTS ---
function renderScripts() {
    const grid = document.getElementById("scriptGrid");
    grid.innerHTML = "";
    if(!currentFolderId) return;

    const scripts = JSON.parse(localStorage.getItem("vault_scripts"));
    const folderScripts = scripts.filter(s => s.folderId === currentFolderId);

    folderScripts.forEach(script => {
        const card = document.createElement("div");
        card.className = "script-card";
        card.innerHTML = `
            <div>
                <h4>${script.title}</h4>
                <p>Local ID: ${script.id}</p>
            </div>
            <div class="card-actions">
                <button onclick="openScriptModal('${script.id}')" style="padding:5px 10px; font-size:11px;">Edit</button>
                <button class="btn-danger" onclick="deleteScript('${script.id}')" style="padding:5px 10px; font-size:11px;">Delete</button>
            </div>
        `;
        grid.appendChild(card);
    });
}

function openScriptModal(scriptId) {
    activeEditingScriptId = scriptId;
    const modal = document.getElementById("scriptModal");
    const loadstringBtn = document.getElementById("modalLoadstringBtn");
    modal.style.display = "flex";

    if(scriptId) {
        // Modo Edición de script existente
        const scripts = JSON.parse(localStorage.getItem("vault_scripts"));
        const script = scripts.find(s => s.id === scriptId);
        document.getElementById("modalTitle").innerText = "Edit Script";
        document.getElementById("scriptTitleInput").value = script.title;
        document.getElementById("scriptTextInput").value = script.code;
        
        // El loadstring emulado localmente usando la API de datos locales
        loadstringBtn.style.display = "block";
        loadstringBtn.onclick = function() {
            // Genera un comando simulado limpio
            const simulatedCommand = `print("Executing ${script.title}...") -- Local ID: ${script.id}\nlocal code = [[${script.code}]]; loadstring(code)()`;
            navigator.clipboard.writeText(simulatedCommand);
            alert("Loadstring local emulado guardado en portapapeles!");
        };
    } else {
        // Modo Crear script nuevo
        document.getElementById("modalTitle").innerText = "New Script";
        document.getElementById("scriptTitleInput").value = "";
        document.getElementById("scriptTextInput").value = "";
        loadstringBtn.style.display = "none";
    }
}

function closeScriptModal() {
    document.getElementById("scriptModal").style.display = "none";
}

function saveScriptData() {
    const title = document.getElementById("scriptTitleInput").value.trim();
    const code = document.getElementById("scriptTextInput").value;
    if(!title) return alert("Please enter a script name");

    let scripts = JSON.parse(localStorage.getItem("vault_scripts"));

    if(activeEditingScriptId) {
        // Actualizar existente
        scripts = scripts.map(s => {
            if(s.id === activeEditingScriptId) {
                return { ...s, title: title, code: code };
            }
            return s;
        });
    } else {
        // Añadir nuevo script a la carpeta activa
        const newScript = {
            id: "sc_" + Math.random().toString(36).substr(2, 9),
            folderId: currentFolderId,
            title: title,
            code: code
        };
        scripts.push(newScript);
    }

    localStorage.setItem("vault_scripts", JSON.stringify(scripts));
    closeScriptModal();
    renderScripts();
}

function deleteScript(id) {
    if(!confirm("Delete this script?")) return;
    let scripts = JSON.parse(localStorage.getItem("vault_scripts"));
    scripts = scripts.filter(s => s.id !== id);
    localStorage.setItem("vault_scripts", JSON.stringify(scripts));
    renderScripts();
}

// Mantener sesión si recarga la página por accidente
if(sessionStorage.getItem("logged_user")) {
    showScreen('Dashboard');
    renderFolders();
}
</script>
</body>
</html>
