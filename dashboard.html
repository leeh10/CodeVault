<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>CodeVault — Premium Executive Dashboard</title>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;500;600;700&family=Space+Grotesk:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #040404;
  --surface: #0a0a0a;
  --surface2: #121212;
  --border: #1c1c1c;
  --border2: #282828;
  --text: #f5f5f5;
  --muted: #666666;
  --accent: #ffffff;
  --accent-dim: #a3a3a3;
  --danger: #ef4444;
  --danger-bg: rgba(239, 68, 68, 0.07);
}

* { margin:0; padding:0; box-sizing:border-box; }
body {
  background: var(--bg);
  color: var(--text);
  font-family: 'Space Grotesk', sans-serif;
  min-height: 100vh;
  overflow-x: hidden;
  position: relative;
}

#canvas { position: fixed; inset: 0; z-index: 0; pointer-events: none; }
body::before {
  content:''; position:fixed; inset:0; z-index:1; pointer-events:none;
  background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.03'/%3E%3C/svg%3E");
  background-size: 200px; opacity: 0.4;
}

.container { position: relative; z-index: 2; max-width: 1100px; margin: 0 auto; padding: 24px 16px; }

/* HEADER PREMIUM RESPONSIVO */
header {
  display: flex; justify-content: space-between; align-items: center;
  margin-bottom: 24px; animation: fadeUp 0.6s cubic-bezier(.16,1,.3,1) both;
  background: rgba(10, 10, 10, 0.75); padding: 14px 20px; border-radius: 14px;
  border: 1px solid var(--border); backdrop-filter: blur(12px); gap: 12px;
}
.logo-wrap { display: flex; align-items: center; gap: 10px; text-decoration: none; color: var(--text); }
.logo-icon {
  width: 32px; height: 32px; background: var(--surface2); border: 1px solid var(--border2);
  border-radius: 8px; display: flex; align-items: center; justify-content: center; font-size: 14px; color: var(--text);
}
.logo { font-family: 'JetBrains Mono', monospace; font-size: 20px; font-weight: 700; letter-spacing: -1px; }
.logo span { color: var(--muted); }

/* BARRA DE BÚSQUEDA AJUSTADA */
.search-box-container { position: relative; flex: 1; max-width: 280px; }
.search-box-container input {
  width: 100%; background: var(--surface2); border: 1px solid var(--border); padding: 10px 12px 10px 36px;
  border-radius: 8px; color: #fff; font-size: 13px; font-family: 'Space Grotesk'; transition: border-color 0.2s;
}
.search-box-container input:focus { border-color: var(--border2); outline: none; }
.search-box-container::before { content: '🔍'; position: absolute; left: 12px; top: 11px; font-size: 12px; opacity: 0.4; }

.header-right { display: flex; gap: 10px; align-items: center; }
.user-avatar-btn {
  width: 38px; height: 38px; border-radius: 50%; object-fit: cover;
  background: var(--surface2); border: 1px solid var(--border2); cursor: pointer; transition: transform 0.2s;
}
.user-avatar-btn:hover { transform: scale(1.05); }

/* CONTENEDOR PRINCIPAL DESAMONTONADO */
.dashboard-layout { display: grid; grid-template-columns: 280px 1fr; gap: 24px; animation: fadeUp 0.7s 0.1s cubic-bezier(.16,1,.3,1) both; }

/* SECCIONES FLUIDAS Y AMPLIAS */
.sidebar { background: var(--surface); border: 1px solid var(--border); border-radius: 16px; padding: 24px; display: flex; flex-direction: column; gap: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.2); height: max-content; }
.sidebar h3 { font-family: 'JetBrains Mono', monospace; font-size: 11px; color: var(--muted); text-transform: uppercase; letter-spacing: 0.15em; font-weight: 600; margin-bottom: 4px; }

.folder-list { list-style: none; display: flex; flex-direction: column; gap: 8px; }
.folder-item {
  padding: 14px; background: var(--surface2); border: 1px solid var(--border);
  border-radius: 10px; cursor: pointer;
  display: flex; justify-content: space-between; align-items: center; font-size: 14px; transition: all 0.2s ease;
}
.folder-item:hover { border-color: var(--border2); background: rgba(255,255,255,0.01); }
.folder-item.active { border-color: var(--accent-dim); background: rgba(255,255,255,0.02); font-weight: 600; }
.folder-item span { display: flex; align-items: center; gap: 10px; width: 100%; user-select: none; }

.delete-btn { background: transparent; color: #555; border: none; cursor: pointer; font-size: 14px; padding: 6px 10px; border-radius: 6px; transition: all 0.2s; }
.delete-btn:hover { color: var(--danger); background: var(--danger-bg); }

.main-content { background: var(--surface); border: 1px solid var(--border); border-radius: 16px; padding: 24px; min-height: 450px; box-shadow: 0 10px 30px rgba(0,0,0,0.2); }
.content-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 24px; border-bottom: 1px solid var(--border); padding-bottom: 16px; gap: 10px; }
.script-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(230px, 1fr)); gap: 16px; }

/* RE-DISEÑO TOTAL DEL MENÚ LATERAL DE TRES RAYAS */
.hamburger-sidebar {
  position: fixed; top: 0; right: -340px; width: 320px; height: 100vh;
  background: #070707; border-left: 1px solid var(--border); z-index: 999;
  padding: 32px 24px; display: flex; flex-direction: column;
  transition: right 0.35s cubic-bezier(.16,1,.3,1); box-shadow: -20px 0 50px rgba(0,0,0,0.85);
}
.hamburger-sidebar.open { right: 0; }

.menu-top-nav { display: flex; justify-content: space-between; align-items: center; margin-bottom: 32px; }
.menu-top-title { font-family: 'JetBrains Mono'; font-size: 13px; color: var(--muted); letter-spacing: 0.1em; text-transform: uppercase; }

/* Botón X Rediseñado */
.close-menu-btn {
  width: 36px; height: 36px; background: var(--surface2); border: 1px solid var(--border);
  color: var(--text); font-size: 14px; border-radius: 50%; cursor: pointer;
  display: flex; align-items: center; justify-content: center; transition: all 0.2s;
}
.close-menu-btn:hover { background: var(--border); color: #fff; }

.menu-links-group { display: flex; flex-direction: column; gap: 8px; margin-bottom: 24px; }
.menu-link-item {
  width: 100%; text-align: left; background: var(--surface); border: 1px solid var(--border); color: var(--text);
  padding: 14px 16px; font-family: 'Space Grotesk', sans-serif; font-size: 14px; font-weight: 500;
  cursor: pointer; border-radius: 10px; display: flex; align-items: center; gap: 12px; transition: all 0.2s;
}
.menu-link-item:hover { background: var(--surface2); border-color: var(--border2); transform: translateX(2px); }

/* Sección de Cuentas Vinculadas */
.account-section {
  border-top: 1px solid var(--border); padding-top: 20px; margin-top: 10px;
  display: flex; flex-direction: column; gap: 10px;
}
.account-section h3 { font-family: 'JetBrains Mono', monospace; font-size: 11px; color: var(--muted); text-transform: uppercase; letter-spacing: 0.1em; }
#accountProfilesList { display: flex; flex-direction: column; gap: 6px; max-height: 180px; overflow-y: auto; }

.account-item-btn {
  width: 100%; text-align: left; background: transparent; border: 1px solid transparent;
  color: var(--accent-dim); font-family: 'Space Grotesk', sans-serif; font-size: 13px;
  padding: 12px; border-radius: 8px; cursor: pointer; display: flex; align-items: center; gap: 10px;
  transition: all 0.2s;
}
.account-item-btn:hover { background: var(--surface2); color: var(--text); }
.account-item-btn.active-acc { border-color: var(--border2); background: rgba(255,255,255,0.03); color: #fff; font-weight: 600; }
.account-badge-current { font-size: 9px; background: var(--text); color: #000; padding: 3px 6px; border-radius: 4px; font-weight: bold; margin-left: auto; font-family: 'JetBrains Mono'; }

/* CARDS DE SCRIPTS */
.script-card {
  background: var(--surface2); border: 1px solid var(--border); border-radius: 12px;
  padding: 20px; display: flex; flex-direction: column; justify-content: space-between; min-height: 160px; transition: all 0.25s cubic-bezier(.16,1,.3,1);
}
.script-card:hover { border-color: var(--border2); transform: translateY(-2px); box-shadow: 0 12px 24px rgba(0,0,0,0.4); }
.script-card h4 { font-family: 'JetBrains Mono', monospace; font-size: 14px; font-weight: 600; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; color: #fff; }
.script-card p { font-family: 'JetBrains Mono', monospace; color: var(--muted); font-size: 11px; margin-top: 4px; }
.card-actions { display: flex; gap: 8px; margin-top: 16px; }

/* MODAL LOADER */
.loader-overlay {
  position: fixed; inset: 0; background: rgba(4,4,4,0.94); backdrop-filter: blur(16px);
  z-index: 9999; display: none; align-items: center; justify-content: center; flex-direction: column; gap: 20px;
}
.cyber-spinner {
  width: 44px; height: 44px; border: 2px solid var(--border2); border-top-color: var(--accent);
  border-radius: 50%; animation: spin 0.8s linear infinite;
}
.loader-text { font-family: 'JetBrains Mono', monospace; font-size: 12px; color: var(--accent-dim); letter-spacing: 0.05em; }

/* INTERFAZ DE BOTONES */
.btn {
  display: inline-flex; align-items: center; justify-content: center; gap: 8px; border: none; border-radius: 8px;
  padding: 12px 18px; font-family: 'Space Grotesk', sans-serif; font-size: 13px; font-weight: 600; cursor: pointer; transition: all 0.2s ease;
}
.btn-primary { background: var(--text); color: #040404; }
.btn-primary:hover { background: var(--accent-dim); transform: translateY(-1px); }
.btn-ghost { background: transparent; color: var(--accent-dim); border: 1px solid var(--border2); }
.btn-ghost:hover { color: var(--text); border-color: #666; background: rgba(255,255,255,0.01); }
.btn-danger { background: transparent; color: var(--muted); border: 1px solid var(--border); }
.btn-danger:hover { color: var(--danger); border-color: rgba(239, 68, 68, 0.2); background: var(--danger-bg); }

.menu-trigger-btn { background: transparent; border: none; color: var(--text); font-size: 24px; cursor: pointer; display: flex; align-items: center; padding: 6px; }
.toast {
  position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%) translateY(20px);
  background: var(--text); color: #040404; font-family: 'Space Grotesk', sans-serif;
  font-size: 13px; font-weight: 600; padding: 12px 22px; border-radius: 8px;
  pointer-events: none; opacity: 0; transition: all 0.3s cubic-bezier(.16,1,.3,1); z-index: 1000;
}
.toast.show { opacity:1; transform:translateX(-50%) translateY(0); }

/* OPTIMIZACIÓN CRUCIAL PARA SMARTPHONES (ANTI-AMONTONADO) */
@media (max-width: 768px) {
  .container { padding: 16px 12px; }
  header { padding: 12px 14px; margin-bottom: 20px; }
  .logo { font-size: 18px; }
  .search-box-container { max-width: 140px; }
  .search-box-container input { padding: 8px 10px 8px 28px; font-size: 12px; }
  .search-box-container::before { left: 10px; top: 9px; font-size: 10px; }
  
  .dashboard-layout { grid-template-columns: 1fr; gap: 20px; }
  .sidebar { padding: 18px; gap: 14px; }
  .main-content { padding: 20px; min-height: 380px; }
  .folder-item { padding: 12px; }
}
@keyframes fadeUp { from { opacity:0; transform: translateY(12px); } to { opacity:1; transform: translateY(0); } }
@keyframes spin { to { transform: rotate(360deg); } }
</style>
</head>
<body>

<canvas id="canvas"></canvas>

<div id="loaderOverlay" class="loader-overlay">
  <div class="cyber-spinner"></div>
  <div id="loaderText" class="loader-text">> DECRYPTING VAULT INSTANCE...</div>
</div>

<div class="container">
  <header>
    <a class="logo-wrap" href="#">
      <div class="logo-icon">⬡</div>
      <div class="logo">Code<span>Vault</span></div>
    </a>
    
    <div class="search-box-container">
      <input type="text" id="dashboardSearch" placeholder="Search..." oninput="renderScripts()">
    </div>
    
    <div class="header-right">
      <img id="headerUserAvatar" class="user-avatar-btn" src="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='%23666'%3E%3Cpath d='M12 12c2.21 0 4-1.79 4-4s-1.79-4-4-4-4 1.79-4 4 1.79 4 4 4zm0 2c-2.67 0-8 1.34-8 4v2h16v-2c0-2.66-5-3.33-8-3.33z'/%3E%3C/svg%3E" onclick="toggleHamburgerMenu(true)">
      <button class="menu-trigger-btn" onclick="toggleHamburgerMenu(true)">☰</button>
    </div>
  </header>

  <div class="dashboard-layout">
    <div class="sidebar">
      <h3>📂 Folders</h3>
      <ul id="folderList" class="folder-list"></ul>
      <button class="btn btn-ghost" style="width: 100%;" onclick="createNewFolder()">+ New Folder</button>
    </div>

    <div class="main-content">
      <div class="content-header">
        <h3 id="currentFolderName" style="font-family:'JetBrains Mono'; font-size:13px; color:var(--muted); font-weight:500;">Select a folder layout</h3>
        <button id="newScriptBtn" class="btn btn-primary" style="display: none; padding: 8px 14px; font-size: 12px;" onclick="goToEditorForNewScript()">+ Add Script</button>
      </div>
      <div id="scriptGrid" class="script-grid"></div>
    </div>
  </div>
</div>

<div id="hamburgerMenu" class="hamburger-sidebar">
  <div class="menu-top-nav">
    <div class="menu-top-title">Navigation Hub</div>
    <button class="close-menu-btn" onclick="toggleHamburgerMenu(false)">✕</button>
  </div>
  
  <div class="menu-links-group">
    <button class="menu-link-item" onclick="window.location.href='dashboard.html'">📂 Dashboard Hub</button>
    <button class="menu-link-item" onclick="window.location.href='profile.html'">⚙️ Edit My Profile</button>
  </div>
  
  <div class="account-section">
    <h3>👤 Linked Vault Profiles</h3>
    <div id="accountProfilesList"></div>
    <button class="btn btn-ghost" style="width:100%; font-size:11px; padding:8px 12px;" onclick="linkAnotherProfile()">+ Link Another Profile</button>
  </div>
  
  <button class="menu-link-item" style="color: var(--danger); margin-top: auto; border: 1px solid rgba(239, 68, 68, 0.15); background: var(--danger-bg);" onclick="logout()">➔ Log Out Account</button>
</div>

<div class="toast" id="toast"></div>

<script>
/* Particle Engine */
const canvas = document.getElementById('canvas'); const ctx = canvas.getContext('2d'); let W, H;
function resize() { W = canvas.width = innerWidth; H = canvas.height = innerHeight; } resize(); addEventListener('resize', resize);
class Particle {
  constructor() { this.reset(true); }
  reset(init) {
    this.x = Math.random() * W; this.y = init ? Math.random() * H : H + 10;
    this.vx = (Math.random() - 0.5) * 0.15; this.vy = -(Math.random() * 0.2 + 0.05);
    this.r = Math.random() * 0.8 + 0.4; this.alpha = Math.random() * 0.25 + 0.05; this.life = 0; this.maxLife = Math.random() * 600 + 300;
  }
  update() { this.x += this.vx; this.y += this.vy; this.life++; if (this.life > this.maxLife || this.y < -10) this.reset(false); }
  draw() { const p = this.life / this.maxLife; const fade = p < 0.1 ? p/0.1 : p > 0.8 ? 1-(p-0.8)/0.2 : 1; ctx.beginPath(); ctx.arc(this.x, this.y, this.r, 0, Math.PI*2); ctx.fillStyle = 'rgba(255,255,255,' + (this.alpha * fade) + ')'; ctx.fill(); }
}
const particles = Array.from({length:45}, () => new Particle());
(function animate() {
  ctx.clearRect(0,0,W,H);
  particles.forEach(p => { p.update(); p.draw(); }); requestAnimationFrame(animate);
})();

/* Vault Core System */
let currentFolderId = null;
const activeUser = localStorage.getItem("logged_user");

if(!activeUser) { window.location.href = "login.html"; }

function showToast(msg) { const t = document.getElementById('toast'); t.textContent = msg; t.classList.add('show'); setTimeout(() => t.classList.remove('show'), 2200); }
function toggleHamburgerMenu(open) { document.getElementById("hamburgerMenu").classList.toggle("open", open); }

function logout() { localStorage.removeItem("logged_user"); window.location.href = "login.html"; }
function linkAnotherProfile() { localStorage.removeItem("logged_user"); window.location.href = "login.html"; }


function loadUserAvatarHeader() {
  const users = JSON.parse(localStorage.getItem("vault_users")) || {};
  
  if(users[activeUser]) {
    if(users[activeUser].avatarUrl) {
      document.getElementById("headerUserAvatar").src = users[activeUser].avatarUrl;
    }
  }
}

function renderAccountProfiles() {
  const usersObj = JSON.parse(localStorage.getItem("vault_users")) || {};
  const container = document.getElementById("accountProfilesList");
  container.innerHTML = "";

  Object.keys(usersObj).forEach(user => {
    const isCurrent = user === activeUser;
    const btn = document.createElement("button");
    btn.className = `account-item-btn ${isCurrent ? 'active-acc' : ''}`;
    
    // CONTROL TOTAL ANTE CUENTAS VIEJAS: Si no existe el nodo interno o el displayName, usa su ID/nombre de usuario original
    const displayAlias = (usersObj[user] && usersObj[user].displayName) ? usersObj[user].displayName : user;
    
    btn.innerHTML = `👤 <span>${displayAlias}</span> ${isCurrent ? '<span class="account-badge-current">ACTIVE</span>' : ''}`;
    if(!isCurrent) { btn.onclick = () => switchAccountSimulation(user); }
    container.appendChild(btn);
  });
}



function switchAccountSimulation(targetUser) {
  toggleHamburgerMenu(false);
  const overlay = document.getElementById("loaderOverlay");
  const loaderText = document.getElementById("loaderText");
  overlay.style.display = "flex";
  loaderText.textContent = `> DECOUPLING INSTANCE...`;
  setTimeout(() => {
    localStorage.setItem("logged_user", targetUser);
    location.reload();
  }, 800);
}

function renderFolders() {
  const folders = JSON.parse(localStorage.getItem("vault_folders")) || [];
  const listElement = document.getElementById("folderList"); listElement.innerHTML = "";
  const userFolders = folders.filter(f => f.username === activeUser);
  userFolders.forEach(folder => {
    const li = document.createElement("li");
    li.className = `folder-item ${currentFolderId === folder.id ? 'active' : ''}`;
    li.innerHTML = `<span onclick="selectFolder('${folder.id}', '${folder.name}')">📁 ${folder.name}</span><button class="delete-btn" onclick="deleteFolder('${folder.id}', event)">✕</button>`;
    listElement.appendChild(li);
  });
}

function createNewFolder() {
  const name = prompt("Enter folder name:"); if(!name || !name.trim()) return;
  const folders = JSON.parse(localStorage.getItem("vault_folders")) || [];
  folders.push({ id: "fold_" + Date.now(), name: name.trim(), username: activeUser });
  localStorage.setItem("vault_folders", JSON.stringify(folders)); renderFolders();
}

function deleteFolder(id, event) {
  event.stopPropagation(); if(!confirm("Delete folder and content?")) return;
  let folders = JSON.parse(localStorage.getItem("vault_folders")) || [];
  localStorage.setItem("vault_folders", JSON.stringify(folders.filter(f => f.id !== id)));
  let scripts = JSON.parse(localStorage.getItem("vault_scripts")) || [];
  localStorage.setItem("vault_scripts", JSON.stringify(scripts.filter(s => s.folderId !== id)));
  if(currentFolderId === id) { currentFolderId = null; document.getElementById("currentFolderName").innerText = "Select a folder layout"; document.getElementById("newScriptBtn").style.display = "none"; }
  renderFolders(); renderScripts();
}

function selectFolder(id, name) {
  currentFolderId = id; document.getElementById("currentFolderName").innerText = `📁 ${name}`;
  document.getElementById("newScriptBtn").style.display = "inline-flex"; renderFolders(); renderScripts();
}

function renderScripts() {
  const grid = document.getElementById("scriptGrid"); grid.innerHTML = ""; if(!currentFolderId) return;
  const scripts = JSON.parse(localStorage.getItem("vault_scripts")) || [];
  const searchVal = document.getElementById("dashboardSearch").value.toLowerCase().trim();
  const folderScripts = scripts.filter(s => s.folderId === currentFolderId && (s.title.toLowerCase().includes(searchVal) || s.id.toLowerCase().includes(searchVal)));
  
  folderScripts.forEach(script => {
    const card = document.createElement("div"); card.className = "script-card";
    card.innerHTML = `<div><h4>${script.title}</h4><p>ID: ${script.id}</p></div>
      <div class="card-actions">
        <button class="btn btn-ghost" style="padding:8px; font-size:11px; width:50%;" onclick="viewScript('${script.id}')">Edit</button>
        <button class="btn btn-danger" style="padding:8px; font-size:11px; width:50%;" onclick="deleteScript('${script.id}')">Delete</button>
      </div>`;
    grid.appendChild(card);
  });
}

function goToEditorForNewScript() {
  localStorage.setItem("active_folder_target", currentFolderId);
  localStorage.setItem("last_active_folder", currentFolderId);
  window.location.href = `index.html?from=dashboard&folderId=${currentFolderId}`;
}

function viewScript(id) { window.location.href = `view.html?id=${id}`; }

function deleteScript(id) {
  if(!confirm("Delete this script?")) return;
  let scripts = JSON.parse(localStorage.getItem("vault_scripts")) || [];
  localStorage.setItem("vault_scripts", JSON.stringify(scripts.filter(s => s.id !== id)));
  renderScripts(); showToast("✓ Script deleted");
}

// ── DISPARADOR ESTRUCTURADO DE CARGA SEGURA DE INTERFAZ ──
document.addEventListener("DOMContentLoaded", () => {
  loadUserAvatarHeader();
  renderFolders(); 
  renderAccountProfiles();

  const restoreFolderId = localStorage.getItem("last_active_folder");
  if(restoreFolderId) {
    const folders = JSON.parse(localStorage.getItem("vault_folders")) || [];
    const targeted = folders.find(f => f.id === restoreFolderId);
    if(targeted) { selectFolder(targeted.id, targeted.name); }
    localStorage.removeItem("last_active_folder");
  }
});
</script>
</body>
</html>
