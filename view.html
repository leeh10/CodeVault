<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">

<title>View Script</title>

<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono&display=swap" rel="stylesheet">

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    background:#0b0b0b;
    color:white;
    font-family:JetBrains Mono, monospace;
    min-height:100vh;
    padding:30px;
}

.container{
    max-width:1000px;
    margin:auto;
}

.title{
    font-size:36px;
    margin-bottom:20px;
}

pre{
    background:#121212;
    border:1px solid #222;
    border-radius:12px;
    padding:20px;
    overflow:auto;
    white-space:pre-wrap;
    word-wrap:break-word;
    color:#00ff88;
    min-height:400px;
}

.actions{
    margin-top:15px;
    display:flex;
    gap:10px;
}

button{
    background:#00ff88;
    color:black;
    border:none;
    padding:12px 20px;
    border-radius:10px;
    cursor:pointer;
    font-weight:bold;
}

button:hover{
    opacity:.8;
}

/* Color personalizado para diferenciar el botón de loadstring */
.btn-loadstring {
    background: #ff0055;
    color: white;
}

.status{
    color:#888;
    margin-bottom:15px;
}

</style>
</head>

<body>

<div class="container">

<h1 class="title">
CodeVault
</h1>

<div id="status" class="status">
Loading script...
</div>

<pre id="code"></pre>

<div class="actions">

<button onclick="copyScript()">
Copy Script
</button>

<!-- Nuevo botón para copiar el Loadstring ejecutable -->
<button class="btn-loadstring" onclick="copyLoadstring()">
Copy Loadstring
</button>

</div>

</div>

<script>

let currentCode = "";
let scriptId = ""; // Guardamos el ID de forma global para usarlo en el loadstring

function getId(){
    const params =
    new URLSearchParams(window.location.search);

    return params.get("id");
}

async function loadScript(){

    scriptId = getId();

    if(!scriptId){
        document.getElementById("status").innerText =
        "Missing script ID";
        return;
    }

    try{

        const response =
        await fetch(
            "https://codevault-gvyn.onrender.com/raw/" + scriptId
        );

        if(!response.ok){
            throw new Error();
        }

        currentCode =
        await response.text();

        document.getElementById("code").textContent =
        currentCode;

        document.getElementById("status").innerText =
        "Script loaded";

    }
    catch{

        document.getElementById("status").innerText =
        "Script not found";
    }
}

function copyScript(){

    navigator.clipboard.writeText(currentCode);

    alert("Script copied");
}

// Nueva función para generar y copiar el comando ejecutable de Roblox
function copyLoadstring(){
    if(!scriptId){
        alert("Script not loaded yet.");
        return;
    }

    const rawUrl = "https://codevault-gvyn.onrender.com/raw/" + scriptId;
    const loadstringCommand = `loadstring(game:HttpGet("${rawUrl}"))()`;

    navigator.clipboard.writeText(loadstringCommand);

    alert("Loadstring copied for Delta Executor!");
}

loadScript();

</script>

</body>
</html>
