<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">

<title>View & Edit Script - CodeVault</title>

<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono&display=swap" rel="stylesheet">

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    background:#0b0b0b;
    color:white;
    font-family:JetBrains Mono, monospace;
    min-height:100vh;
    padding:30px;
}

.container{
    max-width:1000px;
    margin:auto;
}

.header{
    display:flex;
    justify-content:space-between;
    align-items:center;
    margin-bottom:20px;
}

.title{
    font-size:36px;
}

.header-buttons{
    display:flex;
    gap:10px;
}

textarea{
    width:100%;
    height:500px;
    background:#121212;
    color:#00ff88;
    border:1px solid #222;
    border-radius:12px;
    padding:20px;
    resize:none;
    font-family:JetBrains Mono, monospace;
    font-size:14px;
    transition: border-color 0.3s ease;
}

/* Modo Lectura */
textarea:readonly {
    color: #00cc6e;
    cursor: default;
    outline: none;
}

/* Modo Edición Activo */
textarea:not(:readonly) {
    border: 1px solid #00ff88;
    box-shadow: 0 0 10px rgba(0, 255, 136, 0.1);
}

.actions{
    margin-top:15px;
    display:flex;
    gap:10px;
}

button{
    background:#00ff88;
    color:black;
    border:none;
    padding:12px 20px;
    border-radius:10px;
    cursor:pointer;
    font-weight:bold;
}

button:hover{
    opacity:.8;
}

.btn-loadstring {
    background: #ff0055;
    color: white;
}

/* Botones Superiores */
.btn-edit {
    background: #0088ff;
    color: white;
}

.btn-save {
    background: #00ff88;
    color: black;
    display: none; /* Oculto al principio */
}

.status{
    color:#888;
    margin-bottom:15px;
}

</style>
</head>

<body>

<div class="container">

<div class="header">
    <h1 class="title">CodeVault</h1>
    
    <div class="header-buttons">
        <button id="btnEdit" class="btn-edit" onclick="enableEdit()">
            Edit
        </button>
        <button id="btnSave" class="btn-save" onclick="saveChanges()">
            Save Changes
        </button>
    </div>
</div>

<div id="status" class="status">
    Loading script...
</div>

<textarea id="code" placeholder="Loading code..." readonly></textarea>

<div class="actions">

<button onclick="copyScript()">
    Copy Script
</button>

<button class="btn-loadstring" onclick="copyLoadstring()">
    Copy Loadstring
</button>

</div>

</div>

<script>

let scriptId = "";

function getId(){
    const params = new URLSearchParams(window.location.search);
    return params.get("id");
}

async function loadScript(){
    scriptId = getId();

    if(!scriptId){
        document.getElementById("status").innerText = "Missing script ID";
        return;
    }

    try{
        const response = await fetch(
            "https://codevault-gvyn.onrender.com/raw/" + scriptId
        );

        if(!response.ok){
            throw new Error();
        }

        const currentCode = await response.text();
        
        document.getElementById("code").value = currentCode;
        document.getElementById("status").innerText = "Script loaded (Read-Only)";

    }
    catch{
        document.getElementById("status").innerText = "Script not found";
    }
}

// 1. Al presionar EDIT: Oculta Editar, muestra Guardar y desbloquea el texto
function enableEdit(){
    const textarea = document.getElementById("code");
    
    textarea.readOnly = false; // Desbloquear
    textarea.focus(); // Poner cursor listo para escribir

    document.getElementById("btnEdit").style.display = "none";  // Ocultar botón Edit
    document.getElementById("btnSave").style.display = "block"; // Mostrar botón Save Changes
    document.getElementById("status").innerText = "Editing mode active...";
}

// 2. Al presionar SAVE CHANGES: Envía datos, vuelve al estado inicial si todo sale bien
async function saveChanges(){
    const textarea = document.getElementById("code");
    const updatedCode = textarea.value;

    if(!updatedCode.trim()){
        alert("The script cannot be empty.");
        return;
    }

    document.getElementById("status").innerText = "Saving changes...";
    
    try {
        const response = await fetch(
            "https://codevault-gvyn.onrender.com/save", 
            {
                method: "POST",
                headers: {
                    "Content-Type": "application/json"
                },
                body: JSON.stringify({
                    id: scriptId,
                    code: updatedCode
                })
            }
        );

        if(response.ok) {
            textarea.readOnly = true; // Volver a bloquear código

            document.getElementById("btnSave").style.display = "none"; // Ocultar Save Changes
            document.getElementById("btnEdit").style.display = "block"; // Volver a mostrar Edit
            
            document.getElementById("status").innerText = "Changes saved successfully! (Read-Only)";
            alert("Changes saved!");
        } else {
            throw new Error();
        }
    } catch {
        document.getElementById("status").innerText = "Error saving changes.";
        alert("Failed to save changes.");
    }
}

function copyScript(){
    const codeText = document.getElementById("code").value;
    navigator.clipboard.writeText(codeText);
    alert("Script copied");
}

function copyLoadstring(){
    if(!scriptId){
        alert("Script not loaded yet.");
        return;
    }

    const rawUrl = "https://codevault-gvyn.onrender.com/raw/" + scriptId;
    const loadstringCommand = `loadstring(game:HttpGet("${rawUrl}"))()`;

    navigator.clipboard.writeText(loadstringCommand);
    alert("Loadstring copied for Delta Executor!");
}

loadScript();

</script>

</body>
</html>
