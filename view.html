<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">

<title>Edit Script - CodeVault</title>

<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono&display=swap" rel="stylesheet">

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    background:#0b0b0b;
    color:white;
    font-family:JetBrains Mono, monospace;
    min-height:100vh;
    padding:30px;
}

.container{
    max-width:1000px;
    margin:auto;
}

/* Flexbox para poner el título y el botón de guardar alineados arriba */
.header{
    display:flex;
    justify-content:space-between;
    align-items:center;
    margin-bottom:20px;
}

.title{
    font-size:36px;
}

textarea{
    width:100%;
    height:500px;
    background:#121212;
    color:#00ff88;
    border:1px solid #222;
    border-radius:12px;
    padding:20px;
    resize:none;
    font-family:JetBrains Mono, monospace;
    font-size:14px;
}

.actions{
    margin-top:15px;
    display:flex;
    gap:10px;
}

button{
    background:#00ff88;
    color:black;
    border:none;
    padding:12px 20px;
    border-radius:10px;
    cursor:pointer;
    font-weight:bold;
}

button:hover{
    opacity:.8;
}

.btn-loadstring {
    background: #ff0055;
    color: white;
}

.btn-save-edit {
    background: #0088ff;
    color: white;
}

.status{
    color:#888;
    margin-bottom:15px;
}

</style>
</head>

<body>

<div class="container">

<div class="header">
    <h1 class="title">CodeVault</h1>
    <!-- Botón de guardar cambios arriba de todo -->
    <button class="btn-save-edit" onclick="updateScript()">
        Save Changes
    </button>
</div>

<div id="status" class="status">
    Loading script...
</div>

<!-- Cambiado de <pre> a <textarea> para que sea editable de inmediato -->
<textarea id="code" placeholder="Loading code..."></textarea>

<div class="actions">

<button onclick="copyScript()">
    Copy Script
</button>

<button class="btn-loadstring" onclick="copyLoadstring()">
    Copy Loadstring
</button>

</div>

</div>

<script>

let scriptId = "";

function getId(){
    const params = new URLSearchParams(window.location.search);
    return params.get("id");
}

async function loadScript(){
    scriptId = getId();

    if(!scriptId){
        document.getElementById("status").innerText = "Missing script ID";
        return;
    }

    try{
        const response = await fetch(
            "https://codevault-gvyn.onrender.com/raw/" + scriptId
        );

        if(!response.ok){
            throw new Error();
        }

        const currentCode = await response.text();
        
        // Insertamos el código dentro del textarea para que el usuario pueda editarlo
        document.getElementById("code").value = currentCode;
        document.getElementById("status").innerText = "Script loaded. You can edit it now.";

    }
    catch{
        document.getElementById("status").innerText = "Script not found";
    }
}

// Nueva función para actualizar el script en tu base de datos/backend
async function updateScript(){
    const updatedCode = document.getElementById("code").value;

    if(!updatedCode.trim()){
        alert("The script cannot be empty.");
        return;
    }

    document.getElementById("status").innerText = "Saving changes...";

    try {
        // Asumiendo que tu API en Render soporta PUT/POST para actualizar usando el ID. 
        // Si tu backend requiere una ruta diferente como /update, cámbiala aquí abajo.
        const response = await fetch(
            "https://codevault-gvyn.onrender.com/save", 
            {
                method: "POST",
                headers: {
                    "Content-Type": "application/json"
                },
                body: JSON.stringify({
                    id: scriptId, // Le enviamos el mismo ID para sobrescribir o actualizar
                    code: updatedCode
                })
            }
        );

        if(response.ok) {
            document.getElementById("status").innerText = "Changes saved successfully!";
            alert("Changes saved!");
        } else {
            throw new Error();
        }
    } catch {
        document.getElementById("status").innerText = "Error saving changes. Check backend configuration.";
        alert("Failed to save changes.");
    }
}

function copyScript(){
    const codeText = document.getElementById("code").value;
    navigator.clipboard.writeText(codeText);
    alert("Script copied");
}

function copyLoadstring(){
    if(!scriptId){
        alert("Script not loaded yet.");
        return;
    }

    const rawUrl = "https://codevault-gvyn.onrender.com/raw/" + scriptId;
    const loadstringCommand = `loadstring(game:HttpGet("${rawUrl}"))()`;

    navigator.clipboard.writeText(loadstringCommand);
    alert("Loadstring copied for Delta Executor!");
}

loadScript();

</script>

</body>
</html>
