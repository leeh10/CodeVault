<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>CodeVault — View Script</title>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;600;700&family=Space+Grotesk:wght@300;400;600;700&display=swap" rel="stylesheet">

<script>
  // ── INTERCEPTOR AUTOMÁTICO PARA EJECUTORES DE ROBLOX (MODO RAW) ──
  const urlParams = new URLSearchParams(window.location.search);
  const idScript = urlParams.get('id');
  const esRawMode = urlParams.get('raw') === 'true';

  if (esRawMode && idScript) {
    // CORREGIDO: Apunta al subdominio activo vlv1 en lugar del antiguo gvyn
    fetch('https://codevault-vlv1.onrender.com/raw/' + idScript)
      .then(res => res.text())
      .then(luaCode => {
        document.open();
        document.write(luaCode);
        document.close();
      })
      .catch(() => {
        document.open();
        document.write('-- Error: No se pudo conectar con el servidor CodeVault.');
        document.close();
      });
  }
</script>

<style>
:root {
  --bg: #080808;
  --surface: #0f0f0f;
  --surface2: #161616;
  --border: #242424;
  --border2: #2e2e2e;
  --text: #f0f0f0;
  --muted: #555;
  --accent: #ffffff;
  --accent2: #c8c8c8;
}

* { margin:0; padding:0; box-sizing:border-box; }
html { scroll-behavior: smooth; }

body {
  background: var(--bg);
  color: var(--text);
  font-family: 'Space Grotesk', sans-serif;
  min-height: 100vh;
  overflow-x: hidden;
  position: relative;
}

#canvas {
  position: fixed;
  inset: 0;
  z-index: 0;
  pointer-events: none;
}

body::before {
  content:'';
  position:fixed;
  inset:0;
  z-index:1;
  pointer-events:none;
  background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.04'/%3E%3C/svg%3E");
  background-size: 200px;
  opacity: 0.5;
}

.container {
  position: relative;
  z-index: 2;
  max-width: 860px;
  margin: 0 auto;
  padding: 40px 24px 80px;
}

/* BACK LINK */
.back-link {
  display: inline-flex;
  align-items: center;
  gap: 8px;
  font-family: 'JetBrains Mono', monospace;
  font-size: 11px;
  color: var(--muted);
  text-decoration: none;
  transition: color 0.2s;
  margin-bottom: 24px;
  animation: fadeUp 0.6s cubic-bezier(.16,1,.3,1) both;
}
.back-link:hover { color: var(--text); }
.back-link svg { width: 12px; height: 12px; }

/* HEADER */
header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 32px;
  animation: fadeUp 0.8s cubic-bezier(.16,1,.3,1) both;
}

.logo-wrap {
  display: flex;
  align-items: center;
  gap: 12px;
  text-decoration: none;
}

.logo-icon {
  width: 34px;
  height: 34px;
  background: var(--surface2);
  border: 1px solid var(--border2);
  border-radius: 9px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 16px;
  color: var(--text);
}

.logo {
  font-family: 'JetBrains Mono', monospace;
  font-size: 24px;
  font-weight: 700;
  color: var(--text);
  letter-spacing: -0.5px;
}

.logo span { color: var(--muted); }

.header-actions {
  display: flex;
  align-items: center;
  gap: 8px;
}

/* STATUS BAR */
.status-bar {
  display: flex;
  align-items: center;
  gap: 12px;
  margin-bottom: 20px;
  animation: fadeUp 0.8s 0.05s cubic-bezier(.16,1,.3,1) both;
}

.status-pill {
  display: inline-flex;
  align-items: center;
  gap: 7px;
  font-family: 'JetBrains Mono', monospace;
  font-size: 11px;
  color: var(--muted);
  background: var(--surface2);
  border: 1px solid var(--border);
  padding: 5px 14px;
  border-radius: 20px;
  transition: all 0.3s;
}

.status-pill .dot {
  width: 6px;
  height: 6px;
  border-radius: 50%;
  background: #333;
  transition: background 0.4s;
}

.status-pill.loading .dot { background: #888; animation: blink 1s infinite; }
.status-pill.ready .dot   { background: #4caf50; box-shadow: 0 0 8px #4caf5066; animation: pulse-dot 2s infinite; }
.status-pill.editing .dot { background: #f0c040; box-shadow: 0 0 8px #f0c04066; }
.status-pill.error .dot   { background: #e05555; box-shadow: 0 0 8px #e0555566; }

@keyframes blink { 0%,100%{opacity:1} 50%{opacity:0.3} }
@keyframes pulse-dot { 0%,100%{box-shadow:0 0 8px #4caf5066} 50%{box-shadow:0 0 16px #4caf5099} }

.script-id {
  font-family: 'JetBrains Mono', monospace;
  font-size: 11px;
  color: #333;
}

/* EDITOR CARD */
.editor-card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 16px;
  overflow: hidden;
  animation: fadeUp 0.8s 0.1s cubic-bezier(.16,1,.3,1) both;
  transition: border-color 0.35s, box-shadow 0.35s;
}

.editor-card.edit-mode {
  border-color: #383838;
  box-shadow: 0 0 40px rgba(255,255,255,0.02);
}

.topbar {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 14px 20px;
  border-bottom: 1px solid var(--border);
  background: var(--surface2);
}

.topbar-left {
  display: flex;
  align-items: center;
  gap: 10px;
}

.dot-d { width: 10px; height: 10px; border-radius: 50%; }
.dot-d.r { background: #3d1c1c; }
.dot-d.y { background: #3d351c; }
.dot-d.g { background: #1c3d29; }

.lang-badge {
  font-family: 'JetBrains Mono', monospace;
  font-size: 11px;
  color: var(--muted);
  background: var(--border);
  padding: 3px 10px;
  border-radius: 20px;
}

.mode-badge {
  font-family: 'JetBrains Mono', monospace;
  font-size: 10px;
  padding: 3px 9px;
  border-radius: 20px;
  transition: all 0.3s;
}

.mode-badge.readonly { color: #444; background: transparent; border: 1px solid #222; }
.mode-badge.editing  { color: #f0c040; background: rgba(240,192,64,0.05); border: 1px solid rgba(240,192,64,0.2); }

.line-count {
  font-family: 'JetBrains Mono', monospace;
  font-size: 11px;
  color: var(--muted);
}

textarea {
  width: 100%;
  height: 440px;
  background: transparent;
  color: var(--text);
  border: none;
  outline: none;
  padding: 24px;
  resize: none;
  font-family: 'JetBrains Mono', monospace;
  font-size: 13.5px;
  line-height: 1.75;
  caret-color: white;
  transition: color 0.3s;
}

textarea[readonly] {
  color: #777;
  cursor: default;
}

textarea::-webkit-scrollbar { width: 6px; }
textarea::-webkit-scrollbar-track { background: transparent; }
textarea::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 3px; }

.bottombar {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 16px 20px;
  border-top: 1px solid var(--border);
  background: var(--surface2);
  flex-wrap: wrap;
}

/* BUTTONS */
.btn {
  display: inline-flex;
  align-items: center;
  gap: 7px;
  border: none;
  border-radius: 9px;
  padding: 10px 18px;
  font-family: 'Space Grotesk', sans-serif;
  font-size: 13px;
  font-weight: 600;
  cursor: pointer;
  transition: all 0.2s;
  position: relative;
  overflow: hidden;
  white-space: nowrap;
}

.btn::after {
  content:'';
  position:absolute;
  inset:0;
  background:white;
  opacity:0;
  transition:opacity 0.15s;
  border-radius:inherit;
}

.btn:active::after { opacity:0.08; }
.btn svg { width:14px; height:14px; flex-shrink:0; }

.btn-primary { background: var(--text); color: #080808; }
.btn-primary:hover { background: var(--accent2); transform: translateY(-1px); box-shadow: 0 8px 24px rgba(255,255,255,0.1); }

.btn-ghost {
  background: transparent;
  color: var(--muted);
  border: 1px solid var(--border2);
}
.btn-ghost:hover { color: var(--text); border-color: #444; transform: translateY(-1px); }

.btn-edit-mode {
  background: transparent;
  color: #aaa;
  border: 1px solid #2e2e2e;
}
.btn-edit-mode:hover { color: var(--text); border-color: #555; transform: translateY(-1px); }

.btn-save {
  background: var(--text);
  color: #080808;
  display: none;
}
.btn-save:hover { background: var(--accent2); transform: translateY(-1px); }

.btn-danger {
  background: transparent;
  color: #555;
  border: 1px solid #2a2a2a;
  display: none;
}
.btn-danger:hover { color: #e05555; border-color: #e0555544; transform: translateY(-1px); }

/* LOADSTRING SECTION */
.ls-section {
  margin-top: 20px;
  animation: fadeUp 0.5s cubic-bezier(.16,1,.3,1) both;
  display: none;
}

.ls-card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 14px;
  overflow: hidden;
}

.ls-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 14px 20px;
  border-bottom: 1px solid var(--border);
  background: var(--surface2);
}

.ls-label {
  font-family: 'JetBrains Mono', monospace;
  font-size: 10px;
  color: var(--muted);
  letter-spacing: 0.1em;
  text-transform: uppercase;
}

.ls-ready {
  font-family: 'JetBrains Mono', monospace;
  font-size: 10px;
  color: #4caf50;
  display: flex;
  align-items: center;
  gap: 5px;
}

.ls-ready::before {
  content:'';
  display:inline-block;
  width:5px; height:5px;
  background:#4caf50;
  border-radius:50%;
  animation: pulse-dot 2s infinite;
}

.ls-code {
  font-family: 'JetBrains Mono', monospace;
  font-size: 12.5px;
  color: #aaa;
  padding: 18px 20px;
  word-break: break-all;
  line-height: 1.65;
  user-select: all;
}

.ls-copy-btn {
  width: 100%;
  background: transparent;
  border: none;
  border-top: 1px solid var(--border);
  color: var(--muted);
  padding: 13px;
  font-family: 'Space Grotesk', sans-serif;
  font-size: 13px;
  font-weight: 600;
  cursor: pointer;
  transition: all 0.2s;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 8px;
}

.ls-copy-btn:hover { background: var(--border); color: var(--text); }
.ls-copy-btn.copied { color: #4caf50; }
.ls-copy-btn svg { width:14px; height:14px; }

/* TOAST */
.toast {
  position: fixed;
  bottom: 30px;
  left: 50%;
  transform: translateX(-50%) translateY(20px);
  background: var(--text);
  color: #080808;
  font-family: 'Space Grotesk', sans-serif;
  font-size: 13px;
  font-weight: 600;
  padding: 12px 22px;
  border-radius: 10px;
  pointer-events: none;
  opacity: 0;
  transition: all 0.35s cubic-bezier(.16,1,.3,1);
  z-index: 100;
  white-space: nowrap;
}
.toast.show { opacity:1; transform:translateX(-50%) translateY(0); }

@keyframes fadeUp {
  from { opacity:0; transform: translateY(20px); }
  to   { opacity:1; transform: translateY(0); }
}

footer {
  margin-top: 48px;
  text-align: center;
  font-family: 'JetBrains Mono', monospace;
  font-size: 11px;
  color: #222;
  animation: fadeUp 0.8s 0.3s cubic-bezier(.16,1,.3,1) both;
}
</style>
</head>
<body>

<canvas id="canvas"></canvas>

<div class="container">

  <a class="back-link" href="index.html?from=dashboard">
    <svg fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24"><polyline points="15,18 9,12 15,6"/></svg>
    back to vault
  </a>

  <header>
    <a class="logo-wrap" href="index.html?from=dashboard">
      <div class="logo-icon">⬡</div>
      <div class="logo">Code<span>Vault</span></div>
    </a>
    <div class="header-actions">
      <button id="btnEdit" class="btn btn-edit-mode" onclick="enableEdit()">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>
        Edit Script
      </button>
      <button id="btnSave" class="btn btn-save" onclick="saveChanges()">

  <div class="status-bar">

    </div>
    <span class="script-id" id="scriptIdLabel"></span>
  </div>

  <div class="editor-card" id="editorCard">
    <div class="topbar">
      <div class="topbar-left">
        <div class="dot-d r"></div>
        <div class="dot-d y"></div>
        <div class="dot-d g"></div>
        <span class="lang-badge">LUA</span>
        <span class="mode-badge readonly" id="modeBadge">READ-ONLY</span>
      </div>
      <span class="line-count" id="lineCount">— lines</span>
    </div>

    <textarea id="code" placeholder="Awaiting handshake with server..." readonly spellcheck="false"></textarea>

    <div class="bottombar">
      <button class="btn btn-ghost" onclick="copyScript()">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg>
        Copy Code
      </button>
      <button class="btn btn-primary" onclick="copyLoadstring()">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M4 17l6-6-6-6"/><path d="M12 19h8"/></svg>
        Copy Loadstring
      </button>
    </div>
  </div>

  <div class="ls-section" id="lsSection">
    <div class="ls-card">
      <div class="ls-header">
        <span class="ls-label">loadstring · executor ready</span>
        <span class="ls-ready">live</span>
      </div>
      <div class="ls-code" id="lsCode"></div>
      <button class="ls-copy-btn" id="lsCopyBtn" onclick="copyLoadstringFromPanel()">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg>
        Copy Loadstring
      </button>
    </div>
  </div>

  <footer>© 2026 CodeVault — all scripts encrypted at rest</footer>
</div>

<div class="toast" id="toast"></div>

<script>
/* ── BACKGROUND PARTICLES SYSTEM ── */
const canvas = document.getElementById('canvas');
const ctx = canvas.getContext('2d');
let W, H, particles = [];

function resize() { W = canvas.width = window.innerWidth; H = canvas.height = window.innerHeight; }
resize();
window.addEventListener('resize', resize);

class Particle {
  constructor() { this.reset(true); }
  reset(init) {
    this.x = Math.random() * W;
    this.y = init ? Math.random() * H : H + 10;
    this.vx = (Math.random() - 0.5) * 0.25;
    this.vy = -(Math.random() * 0.3 + 0.05);
    this.r = Math.random() * 1.2 + 0.3;
    this.alpha = Math.random() * 0.35 + 0.05;
    this.life = 0;
    this.maxLife = Math.random() * 600 + 300;
  }
  update() {
    this.x += this.vx; this.y += this.vy; this.life++;
    if (this.life > this.maxLife || this.y < -10) this.reset(false);
  }
  draw() {
    const p = this.life / this.maxLife;
    const fade = p < 0.1 ? p / 0.1 : p > 0.8 ? 1 - (p - 0.8) / 0.2 : 1;
    ctx.beginPath();
    ctx.arc(this.x, this.y, this.r, 0, Math.PI * 2);
    ctx.fillStyle = `rgba(255,255,255,${this.alpha * fade})`;
    ctx.fill();
  }
}

for (let i = 0; i < 130; i++) particles.push(new Particle());

function drawConnections() {
  for (let i = 0; i < particles.length; i++) {
    for (let j = i + 1; j < particles.length; j++) {
      const dx = particles[i].x - particles[j].x;
      const dy = particles[i].y - particles[j].y;
      const d = Math.sqrt(dx*dx + dy*dy);
      if (d < 100) {
        ctx.beginPath();
        ctx.moveTo(particles[i].x, particles[i].y);
        ctx.lineTo(particles[j].x, particles[j].y);
        ctx.strokeStyle = `rgba(255,255,255,${(1 - d/100) * 0.04})`;
        ctx.lineWidth = 0.5;
        ctx.stroke();
      }
    }
  }
}

(function animate() {
  ctx.clearRect(0, 0, W, H);
  drawConnections();
  particles.forEach(p => { p.update(); p.draw(); });
  requestAnimationFrame(animate);
})();

/* ── UI CORE STATE ── */
let scriptId = '';
let originalCode = '';

function getId() {
  let id = new URLSearchParams(window.location.search).get('id');
  if (!id) {
    id = localStorage.getItem('idUsuario');
  }
  return id;
}

function setStatus(type, text) {
  const pill = document.getElementById('statusPill');
  const span = document.getElementById('statusText');
  pill.className = 'status-pill ' + type;
  span.textContent = text;
}

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2200);
}

function updateLineCount(val) {
  const lines = val ? val.split('\n').length : 0;
  document.getElementById('lineCount').textContent = `${lines} line${lines === 1 ? '' : 's'}`;
}

/* ── DATA FETCH OPTIMIZADO CON AUTO-REINTENTO ── */
async function loadScript() {
  scriptId = getId();
  
  if (!scriptId) { 
    setStatus('error', 'No local ID linked'); 
    document.getElementById('code').placeholder = "-- Create a script in the main dashboard to generate a local synchronization ID...";
    showToast('⚠ Script identifier missing');
    return; 
  }

  document.getElementById('scriptIdLabel').textContent = `#${scriptId.toUpperCase()}`;

  const rawUrlForExecutor = 'https://codevault-vlv1.onrender.com/raw/' + scriptId;
  const ls = 'loadstring(game:HttpGet("' + rawUrlForExecutor + '"))()';

  document.getElementById('lsCode').textContent = ls;
  document.getElementById('lsSection').style.display = 'block';

  let intentos = 0;
  const maxIntentos = 3;

  async function intentarFetch() {
    try {
      const controller = new AbortController();
      const timeoutId = setTimeout(() => controller.abort(), 40000);

      setStatus('loading', intentos > 0 ? `Waking up server (Attempt ${intentos + 1})...` : 'Synchronizing pipeline...');

      // CORREGIDO: Se removió la sección inválida '/web' intermedia de la ruta para que coincida exactamente con tu backend V10
      const res = await fetch('https://codevault-vlv1.onrender.com/raw/' + scriptId, { signal: controller.signal });
      clearTimeout(timeoutId);

      if (!res.ok) throw new Error();
      const code = await res.text();
      
      document.getElementById('code').value = code;
      originalCode = code;
      updateLineCount(code);
      setStatus('ready', 'Synchronized — Read-Only');
      showToast('✓ Pipeline sync successful');
    } catch (err) {
      intentos++;
      if (intentos < maxIntentos) {
        setStatus('loading', `Server cold boot detected. Retrying in 3s...`);
        setTimeout(intentarFetch, 3000);
      } else {
        setStatus('error', 'Server handshake failed');
        showToast('⚠ Fetch aborted: Render instance sleeping');
      }
    }
  }

  intentarFetch();
}

document.getElementById('code').addEventListener('input', function() {
  updateLineCount(this.value);
});

/* ── INTERFACES & CONTROLS ── */
function enableEdit() {
  const ta = document.getElementById('code');
  ta.readOnly = false;
  ta.focus();
  document.getElementById('btnEdit').style.display = 'none';
  document.getElementById('btnSave').style.display = 'inline-flex';
  document.getElementById('btnCancel').style.display = 'inline-flex';
  document.getElementById('editorCard').classList.add('edit-mode');
  document.getElementById('modeBadge').className = 'mode-badge editing';
  document.getElementById('modeBadge').textContent = 'EDITING';
  setStatus('editing', 'Staging modifications');
}

function cancelEdit() {
  const ta = document.getElementById('code');
  ta.value = originalCode;
  ta.readOnly = true;
  updateLineCount(originalCode);
  document.getElementById('btnEdit').style.display = 'inline-flex';
  document.getElementById('btnSave').style.display = 'none';
  document.getElementById('btnCancel').style.display = 'none';
  document.getElementById('editorCard').classList.remove('edit-mode');
  document.getElementById('modeBadge').className = 'mode-badge readonly';
  document.getElementById('modeBadge').textContent = 'READ-ONLY';
  setStatus('ready', 'Synchronized — Read-Only');
  showToast('Modifications discarded');
}

/* ── SAVE API PIPELINE CORREGIDO PARA ACTUALIZAR EL MISMO ID ── */
async function saveChanges() {
  const ta = document.getElementById('code');
  const updated = ta.value;
  if (!updated.trim()) { showToast('⚠ Working layout cannot be empty'); return; }

  setStatus('loading', 'Pushing database patch...');

  try {
    const controller = new AbortController();
    const timeoutId = setTimeout(() => controller.abort(), 40000);

    const res = await fetch('https://codevault-vlv1.onrender.com/update/' + scriptId, {
      method: 'PUT',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ code: updated }),
      signal: controller.signal
    });

    clearTimeout(timeoutId);

    if (!res.ok) throw new Error();

    originalCode = updated;
    ta.readOnly = true;
    document.getElementById('btnEdit').style.display = 'inline-flex';
    document.getElementById('btnSave').style.display = 'none';
    document.getElementById('btnCancel').style.display = 'none';
    document.getElementById('editorCard').classList.remove('edit-mode');
    document.getElementById('modeBadge').className = 'mode-badge readonly';
    document.getElementById('modeBadge').textContent = 'READ-ONLY';
    setStatus('ready', 'Synchronized — Read-Only');
    showToast('✓ Remote server updated');
  } catch {
    setStatus('error', 'Patch execution failed');
    showToast('⚠ Error committing changes to server');
  }
}

/* ── CLIPBOARD ENGINE ── */
function copyScript() {
  const code = document.getElementById('code').value;
  if (!code.trim()) { showToast('⚠ Editor buffer empty'); return; }
  navigator.clipboard.writeText(code).then(() => showToast('✓ Buffer copied'));
}

function copyLoadstring() {
  const ls = document.getElementById('lsCode').textContent;
  if (!ls) { showToast('⚠ Reference pipeline empty'); return; }
  navigator.clipboard.writeText(ls).then(() => showToast('✓ Loadstring copied'));
}

function copyLoadstringFromPanel() {
  const ls = document.getElementById('lsCode').textContent;
  const btn = document.getElementById('lsCopyBtn');
  navigator.clipboard.writeText(ls).then(() => {
    btn.classList.add('copied');
    btn.innerHTML = `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="20,6 9,17 4,12"/></svg> Copied!`;
    showToast('✓ Pipeline payload copied');
    setTimeout(() => {
      btn.classList.remove('copied');
      btn.innerHTML = `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg> Copy Loadstring`;
    }, 2000);
  });
}

// Inicialización de la secuencia de datos
loadScript();
